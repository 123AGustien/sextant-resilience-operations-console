<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sextant v4 Control Room</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #0b0f1a;
      color: #d6e2ff;
      font-family: Arial, sans-serif;
    }

    .header {
      text-align: center;
      padding: 15px;
      border-bottom: 1px solid #1f2a44;
    }

    .card {
      background: #121a2b;
      margin: 10px;
      padding: 12px;
      border-radius: 10px;
      border: 1px solid #1f2a44;
    }

    button {
      background: #1f3b73;
      color: white;
      border: none;
      padding: 8px 12px;
      margin: 5px;
      border-radius: 6px;
    }

    select {
      padding: 6px;
      border-radius: 6px;
      background: #0f1626;
      color: white;
    }
  </style>
</head>

<body>

  <div class="header">
    <h1>Sextant v4.0</h1>
    <p>Global Geopolitical Macro Simulator</p>
    <div style="color:#00ff88;">● LIVE CONTROL ROOM</div>
  </div>

  <!-- CONTROL PANEL -->
  <div class="card">

    <button onclick="runSimulation()">Run</button>
    <button onclick="resetSimulation()">Reset</button>

    <select onchange="changeLens(this.value)">
      <option value="global">Global Lens</option>
      <option value="singapore">Singapore Lens</option>
      <option value="usa">USA Lens</option>
      <option value="china">China Lens</option>
    </select>

  </div>

  <!-- METRICS -->
  <div class="card">
    <div id="semis">0</div>
    <div id="industrial">0</div>
    <div id="nonTech">0</div>
    <div id="macroIndex">0</div>
  </div>

  <!-- STATUS -->
  <div class="card">
    <div id="decision">---</div>
  </div>

  <!-- LOG -->
  <div class="card">
    <div id="log"></div>
  </div>

  <!-- CORE SYSTEM -->
  <script src="core/world-model.js"></script>
  <script src="core/propagation-engine.js"></script>
  <script src="core/global-macro.js"></script>

  <!-- LENS -->
  <script src="lens.js"></script>

  <!-- SIMULATOR -->
  <script src="simulator.js"></script>

  <!-- CLEAN BOOT (NO AUTO RUN) -->
  <script>
    window.addEventListener("load", function () {
      console.log("Sextant Ready - Manual Control Mode");
    });
  </script>

</body>
</html>
