<!DOCTYPE html>
<html>
<head>
    <title>Control Room v8.1</title>

    <style>
        body {
            font-family: Arial;
            background: #05070d;
            color: #d7f7ff;
            text-align: center;
        }

        #status {
            font-size: 22px;
            margin: 10px;
        }

        .GREEN { color: #2bd4ff; }
        .AMBER { color: orange; }
        .RED { color: red; }

        pre {
            text-align: left;
            max-width: 900px;
            margin: auto;
            background: #0b0f14;
            padding: 10px;
            border: 1px solid #2bd4ff;
        }

        button {
            margin: 5px;
            padding: 10px;
        }
    </style>
</head>

<body>

<h2>Control Room</h2>

<div id="status">READY</div>

<pre id="output">Waiting...</pre>

<div id="riskGraph"></div>

<!-- CORE ENGINE -->
<script src="../core_engine/simulation_engine.js"></script>

<!-- GRAPH LAYER -->
<script src="../assets/risk_graph.js"></script>

<!-- ETO REPORT LAYER -->
<script src="../reports/eto_report.js"></script>

<script>

function run(type) {

    if (!window.runSimulation) {
        document.getElementById("output").innerText = "ENGINE NOT LOADED";
        return;
    }

    // 1. RUN SIMULATION
    const result = runSimulation({
        name: type,
        stress: type === "cascade" ? 0.9 : 0.6
    });

    // 2. ETO REPORT (SAFE WRAPPER)
    const eto = window.generateETOReport
        ? window.generateETOReport(result)
        : result;

    // 3. SCREEN OUTPUT (ETO VIEW)
    document.getElementById("output").innerText =
        JSON.stringify(eto, null, 2);

    // 4. STATUS DISPLAY
    const status = document.getElementById("status");
    status.innerText = result.final_state;
    status.className = result.final_state;

    // 5. GRAPH FEED
    window.RiskGraph?.push({
        impact: (result.fx?.pressure_score ?? 0) * 100
    });
}

// INIT GRAPH
window.addEventListener("load", () => {
    window.RiskGraph?.push({ impact: 0 });
});

</script>

<!-- CONTROLS -->
<button onclick="run('cascade')">Cascade</button>
<button onclick="run('failure')">Failure</button>

</body>
</html>
