<!DOCTYPE html>
<html>
<head>
<title>Sextant Control Room v10 (Unified RP-04 Architecture)</title>

<style>
body {
    font-family: Arial;
    background: #0b0f19;
    color: #e6f7ff;
    text-align: center;
}

button {
    margin: 6px;
    padding: 10px;
    background: black;
    color: #2bd4ff;
    border: 1px solid #2bd4ff;
    cursor: pointer;
}

.panel {
    border: 1px solid #2bd4ff;
    max-width: 900px;
    margin: 15px auto;
    padding: 12px;
    background: #111827;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 900px;
    margin: 20px auto;
}

.node {
    border: 1px solid #2bd4ff;
    padding: 12px;
    background: #111827;
    font-size: 14px;
}

.green { color: lime; border-color: lime; }
.amber { color: orange; border-color: orange; }
.red { color: red; border-color: red; }
.critical { color: magenta; border-color: magenta; }

pre {
    text-align: left;
    background: #0a0a0a;
    padding: 10px;
    font-size: 12px;
    overflow: auto;
}
</style>
</head>

<body>

<h2>SEXTANT CONTROL ROOM v10</h2>
<h3>Status: <span id="status">BOOTING</span></h3>

<div class="panel">
    <h3>RP-04 UNIFIED SIMULATION ENGINE</h3>

    <button onclick="runSim('normal')">Normal</button>
    <button onclick="runSim('failure')">Failure</button>
    <button onclick="runSim('cascade')">Cascade</button>
    <button onclick="resetSim()">Reset</button>
</div>

<div class="grid">
    <div class="node" id="rp04">RP-04</div>
    <div class="node" id="fx">FX</div>
    <div class="node" id="bank">BANK</div>
    <div class="node" id="liq">LIQ</div>
    <div class="node" id="eq">EQ</div>
    <div class="node" id="conf">CONF</div>
</div>

<div class="panel">
    <h3>SIMULATION OUTPUT</h3>
    <div id="output">Waiting...</div>
</div>

<div class="panel">
    <h3>RISK GRAPH (RP-04 CASCADE TRACE)</h3>
    <canvas id="graph" width="800" height="200" style="background:#0a0a0a;"></canvas>
</div>

<div class="panel">
    <h3>AUDIT LOG</h3>
    <div id="log"></div>
</div>

<script>

window.logs = [];

function setNode(id, v) {
    const el = document.getElementById(id);

    let state =
        v < 0.3 ? "green" :
        v < 0.6 ? "amber" :
        v < 0.85 ? "red" : "critical";

    el.className = "node " + state;
    el.innerText = id.toUpperCase() + ": " + v.toFixed(2);
}

/* =========================
   RP-04 UNIFIED ENGINE v10
========================= */
function runSim(type) {

    const rp04 = {
        stability: type === "cascade" ? 0.25 : type === "failure" ? 0.55 : 0.82,
        pressure:  type === "cascade" ? 0.95 : type === "failure" ? 0.6 : 0.28
    };

    const fx = rp04.pressure;

    const bank = fx * 0.83;
    const liq  = bank * 0.88;
    const eq   = liq * 0.91;
    const conf = eq * 0.94;

    const system = { fx, bank, liq, eq, conf };

    const state = rp04.stability > 0.6 ? "STABLE" : "RISK";

    const result = { rp04, system, state };

    window.logs.push(result);

    document.getElementById("status").innerText = state;

    document.getElementById("output").innerHTML =
        "<pre>" + JSON.stringify(result, null, 2) + "</pre>";

    setNode("rp04", rp04.stability);
    setNode("fx", fx);
    setNode("bank", bank);
    setNode("liq", liq);
    setNode("eq", eq);
    setNode("conf", conf);

    drawGraph();
    renderLog();

    /* =========================
       AUDIT EVENT BRIDGE (FIXED)
    ========================= */
    window.dispatchEvent(new CustomEvent("sextant:run", {
        detail: {
            system,
            rp04,
            state,
            scenario: type,
            audit: {
                source: "RP-04",
                version: "v10",
                integrity: "ok"
            },
            timestamp: Date.now()
        }
    }));
}

/* =========================
   GRAPH RENDER
========================= */
function drawGraph() {
    const canvas = document.getElementById("graph");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.strokeStyle = "#2bd4ff";
    ctx.beginPath();

    window.logs.forEach((l, i) => {
        const x = i * 40;
        const y = 180 - (l.system.fx * 150);

        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
    });

    ctx.stroke();
}

/* =========================
   AUDIT LOG
========================= */
function renderLog() {
    document.getElementById("log").innerHTML =
        window.logs.map((l,i) =>
            `<div>#${i} | ${l.state} | FX:${l.system.fx.toFixed(2)}</div>`
        ).join("");
}

/* =========================
   RESET ENGINE
========================= */
function resetSim() {
    window.logs = [];
    document.getElementById("output").innerHTML = "Waiting...";
    document.getElementById("log").innerHTML = "";
    document.getElementById("status").innerText = "RESET";
    drawGraph();
}

drawGraph();

</script>

</body>
</html>
