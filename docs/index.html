<!DOCTYPE html>
<html>
<head>
  <title>Sextant Resilience Control Room</title>

  <style>
    body {
      font-family: Arial;
      background: #0b0f1a;
      color: white;
      margin: 0;
    }

    header {
      padding: 20px;
      background: #11182a;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #151d33;
      padding: 15px;
      border-radius: 10px;
    }

    .node {
      display: inline-block;
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      background: #1f2a44;
    }

    .danger { background: #7f1d1d !important; }
    .warn { background: #92400e !important; }
    .ok { background: #14532d !important; }

    button {
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 6px;
    }

    pre {
      background: #0b0f1a;
      padding: 10px;
      border-radius: 8px;
      height: 200px;
      overflow: auto;
    }
  </style>
</head>

<body>

<header>
  <h1>🧭 Sextant Control Room</h1>
  <p>Live Infrastructure Resilience Simulation</p>
</header>

<div class="grid">

  <div class="card">
    <h2>Control Panel</h2>
    <button onclick="runSim()">Run Simulation</button>
    <p>Risk: <span id="risk">0.00</span></p>
  </div>

  <div class="card">
    <h2>Architecture Map</h2>
    <div id="nodes">
      <div class="node ok" id="api">FastAPI</div>
      <div class="node ok" id="core">Core</div>
      <div class="node ok" id="engine">Engine</div>
      <div class="node ok" id="audit">Audit</div>
    </div>
  </div>

  <div class="card">
    <h2>Event Stream</h2>
    <pre id="log">SYSTEM INITIALIZED...</pre>
  </div>

  <div class="card">
    <h2>Simulation Output</h2>
    <pre id="out">{}</pre>
  </div>

</div>

<script>
function setState(risk) {
  let nodes = ["api","core","engine","audit"];

  nodes.forEach(n => {
    document.getElementById(n).className = "node ok";
  });

  if (risk > 0.3) document.getElementById("engine").className = "node warn";
  if (risk > 0.6) document.getElementById("core").className = "node danger";
  if (risk > 0.8) document.getElementById("api").className = "node danger";
}

function runSim() {
  let risk = parseFloat((Math.random()).toFixed(2));

  setState(risk);

  let event = {
    time: new Date().toISOString(),
    event: "CASCADE_SIMULATION",
    risk: risk
  };

  document.getElementById("risk").innerText = risk;

  document.getElementById("out").innerText =
    JSON.stringify(event, null, 2);

  document.getElementById("log").innerText =
    "[" + event.time + "] risk=" + risk + "\n" +
    document.getElementById("log").innerText;
}
</script>

</body>
</html>

<h3>Scenario</h3>
<select id="scenario">
  <option value="bank">🏦 Bank Core System</option>
  <option value="cloud">☁️ Cloud Infrastructure</option>
  <option value="satellite">🛰 Satellite Network</option>
</select>
