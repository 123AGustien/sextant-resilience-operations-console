<!DOCTYPE html>
<html>
<head>
  <title>Sextant Resilience Control Room</title>

  <style>
    body {
      font-family: Arial;
      background: #0b0f1a;
      color: white;
      margin: 0;
    }

    header {
      padding: 20px;
      background: #11182a;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #151d33;
      padding: 15px;
      border-radius: 10px;
    }

    .node {
      display: inline-block;
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      background: #1f2a44;
    }

    .ok { background: #14532d; }
    .warn { background: #92400e; }
    .danger { background: #7f1d1d; }

    button {
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 6px;
      margin-top: 10px;
    }

    select {
      padding: 8px;
      margin-top: 10px;
      width: 100%;
    }

    pre {
      background: #0b0f1a;
      padding: 10px;
      border-radius: 8px;
      height: 200px;
      overflow: auto;
    }
  </style>
</head>

<body>

<header>
  <h1>🧭 Sextant Control Room</h1>
  <p>Live Infrastructure Resilience Simulation</p>
</header>

<div class="grid">

  <!-- CONTROL PANEL -->
  <div class="card">
    <h2>Control Panel</h2>

    <label>Scenario</label>
    <select id="scenario">
      <option value="bank">🏦 Bank Core System</option>
      <option value="cloud">☁️ Cloud Infrastructure</option>
      <option value="satellite">🛰 Satellite Network</option>
    </select>

    <button onclick="runSim()">Run Simulation</button>

    <p>Risk: <span id="risk">0.00</span></p>
  </div>

  <!-- ARCHITECTURE -->
  <div class="card">
    <h2>Architecture Map</h2>

    <div class="node ok" id="api">FastAPI</div>
    <div class="node ok" id="core">Core</div>
    <div class="node ok" id="engine">Engine</div>
    <div class="node ok" id="audit">Audit</div>
  </div>

  <!-- LOG -->
  <div class="card">
    <h2>Event Stream</h2>
    <pre id="log">SYSTEM INITIALIZED...</pre>
  </div>

  <!-- OUTPUT -->
  <div class="card">
    <h2>Simulation Output</h2>
    <pre id="out">{}</pre>
  </div>

</div>

<script>

function setState(risk) {
  document.getElementById("api").className = "node ok";
  document.getElementById("core").className = "node ok";
  document.getElementById("engine").className = "node ok";
  document.getElementById("audit").className = "node ok";

  if (risk > 0.3) document.getElementById("engine").className = "node warn";
  if (risk > 0.6) document.getElementById("core").className = "node danger";
  if (risk > 0.8) document.getElementById("api").className = "node danger";
}

function runSim() {

  let scenario = document.getElementById("scenario").value;

  let baseRisk = Math.random();
  let multiplier = 1;

  if (scenario === "bank") multiplier = 0.9;
  if (scenario === "cloud") multiplier = 1.1;
  if (scenario === "satellite") multiplier = 1.3;

  let risk = parseFloat((baseRisk * multiplier).toFixed(2));

  setState(risk);

  let event = {
    time: new Date().toISOString(),
    scenario: scenario,
    event: "CASCADE_SIMULATION",
    risk: risk
  };

  document.getElementById("risk").innerText = risk;

  document.getElementById("out").innerText =
    JSON.stringify(event, null, 2);

  document.getElementById("log").innerText =
    "[" + scenario.toUpperCase() + "] " +
    event.time + " risk=" + risk + "\n" +
    document.getElementById("log").innerText;
}

</script>

</body>
</html>
