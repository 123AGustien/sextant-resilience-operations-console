<!DOCTYPE html>
<html>
<head>
  <title>Sextant Resilience Control Room</title>

  <style>
    body {
      font-family: Arial;
      background: #0b0f1a;
      color: white;
      margin: 0;
    }

    header {
      padding: 20px;
      background: #11182a;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: #151d33;
      padding: 15px;
      border-radius: 10px;
    }

    .node {
      display: inline-block;
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      background: #1f2a44;
    }

    .ok { background: #14532d; }
    .warn { background: #92400e; }
    .danger { background: #7f1d1d; }

    button {
      padding: 10px;
      background: #3b82f6;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 6px;
      margin-top: 10px;
    }

    select {
      padding: 8px;
      margin-top: 10px;
      width: 100%;
    }

    pre {
      background: #0b0f1a;
      padding: 10px;
      border-radius: 8px;
      height: 200px;
      overflow: auto;
    }
  </style>
</head>

<body>

<header>
  <h1>🧭 Sextant Control Room</h1>
  <p>Deterministic Infrastructure Cascade Simulation Engine v3</p>
</header>

<div class="grid">

  <!-- CONTROL PANEL -->
  <div class="card">
    <h2>Control Panel</h2>

    <label>Scenario</label>
    <select id="scenario">
      <option value="bank">🏦 Bank Core System</option>
      <option value="cloud">☁️ Cloud Infrastructure</option>
      <option value="satellite">🛰 Satellite Network</option>
    </select>

    <button onclick="runSim()">Run Simulation</button>

    <p>Risk: <span id="risk">0.00</span></p>
  </div>

  <!-- ARCHITECTURE -->
  <div class="card">
    <h2>Architecture Map</h2>

    <div class="node ok" id="api">FastAPI</div>
    <div class="node ok" id="core">Core</div>
    <div class="node ok" id="engine">Engine</div>
    <div class="node ok" id="audit">Audit</div>
  </div>

  <!-- LOG -->
  <div class="card">
    <h2>Event Stream</h2>
    <pre id="log">SYSTEM INITIALIZED...</pre>
  </div>

  <!-- OUTPUT -->
  <div class="card">
    <h2>Simulation Output</h2>
    <pre id="out">{}</pre>
  </div>

</div>

<script>

const nodes = ["api","core","engine","audit"];

function reset() {
  nodes.forEach(n =>
    document.getElementById(n).className = "node ok"
  );
}

function scenarioModel(type) {
  if (type === "bank") return { delay: 900, spread: 0.85 };
  if (type === "cloud") return { delay: 500, spread: 1.1 };
  if (type === "satellite") return { delay: 1200, spread: 1.3 };
}

function sleep(ms) {
  return new Promise(r => setTimeout(r, ms));
}

async function runSim() {

  const scenario = document.getElementById("scenario").value;
  const model = scenarioModel(scenario);

  reset();

  // deterministic seed (no randomness)
  let seed = scenario.length * 17;
  let risk = ((seed % 100) / 100) * model.spread;
  risk = parseFloat(risk.toFixed(2));

  document.getElementById("risk").innerText = risk;

  document.getElementById("out").innerText = JSON.stringify({
    scenario,
    engine: "cascade-v3",
    risk,
    time: new Date().toISOString()
  }, null, 2);

  document.getElementById("log").innerText =
    "[" + scenario.toUpperCase() + "] CASCADE INIT\n" +
    document.getElementById("log").innerText;

  // cascade propagation
  await sleep(model.delay);
  document.getElementById("engine").className = "node warn";

  await sleep(model.delay);

  if (risk > 0.4) document.getElementById("core").className = "node warn";
  if (risk > 0.7) document.getElementById("core").className = "node danger";

  await sleep(model.delay);

  if (risk > 0.6) document.getElementById("api").className = "node warn";
  if (risk > 0.85) document.getElementById("api").className = "node danger";

  document.getElementById("audit").className = "node ok";

  document.getElementById("log").innerText =
    "[" + scenario.toUpperCase() + "] CASCADE COMPLETE | risk=" + risk + "\n" +
    document.getElementById("log").innerText;
}

</script>

</body>
</html>
