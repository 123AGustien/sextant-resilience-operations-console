<!DOCTYPE html>
<html>
<head>
<title>Sextant Control Room v7.1 (RP-04 Wired)</title>

<style>
body {
    font-family: Arial;
    background: #0b0f19;
    color: #e6f7ff;
    text-align: center;
}

button {
    margin: 8px;
    padding: 10px;
    background: black;
    color: #2bd4ff;
    border: 1px solid #2bd4ff;
    cursor: pointer;
}

.panel {
    border: 1px solid #2bd4ff;
    max-width: 750px;
    margin: 15px auto;
    padding: 15px;
    background: #111827;
    border-radius: 6px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    max-width: 750px;
    margin: 20px auto;
}

.node {
    border: 1px solid #2bd4ff;
    padding: 15px;
    background: #111827;
    transition: 0.3s;
}

.green { color: lime; border-color: lime; }
.amber { color: orange; border-color: orange; }
.red { color: red; border-color: red; }
.critical { color: magenta; border-color: magenta; }

pre {
    text-align: left;
    background: #0a0a0a;
    padding: 10px;
    overflow: auto;
    font-size: 12px;
}
</style>
</head>

<body>

<h2>SEXTANT CONTROL ROOM v7.1</h2>
<h3>Status: <span id="status">BOOTING</span></h3>

<!-- CONTROLS -->
<button onclick="runSim('normal')">Normal</button>
<button onclick="runSim('failure')">Failure</button>
<button onclick="runSim('cascade')">Cascade</button>

<!-- FX PANEL -->
<div class="panel">
    <h3>FX PANEL (USD / IDR)</h3>
    <div id="fx_value">USD/IDR: --</div>
    <div id="fx_pressure">Pressure: --</div>
    <div id="fx_regime">Regime: --</div>

    <div style="height:10px;background:#111;border:1px solid #2bd4ff;margin-top:10px;">
        <div id="fx_bar" style="height:10px;width:0%;background:lime;"></div>
    </div>
</div>

<!-- NODES -->
<div class="grid">
    <div class="node" id="rp04">RP-04 ENGINE NODE</div>

    <div class="node" id="fx">FX NODE</div>
    <div class="node" id="bank">BANK NODE</div>
    <div class="node" id="liq">LIQUIDITY NODE</div>
    <div class="node" id="eq">EQUITY NODE</div>
    <div class="node" id="conf">CONFIDENCE NODE</div>
</div>

<!-- OUTPUT -->
<div class="panel">
    <h3>SIMULATION OUTPUT</h3>
    <div id="output">Waiting...</div>
</div>

<!-- LOGS -->
<div class="panel">
    <h3>SIMULATION LOGS</h3>
    <div id="log_list"></div>
</div>

<script>

// ==========================
// LOG STORE
// ==========================
window.simulationLogs = [];

// ==========================
// NODE VISUAL ENGINE
// ==========================
function setNode(id, value) {

    const el = document.getElementById(id);
    value = value || 0;

    let state =
        value < 0.3 ? "green" :
        value < 0.6 ? "amber" :
        value < 0.85 ? "red" :
        "critical";

    el.className = "node " + state;

    el.innerText = id.toUpperCase() + ": " + value.toFixed(2);
}

// ==========================
// SIMULATION ENGINE
// ==========================
function runSim(type) {

    let scenario = { name: "NORMAL" };

    if (type === "cascade") {
        scenario = {
            name: "STRESS CASCADE",
            oil_price: 110,
            capital_flow: "outflow",
            inflation_pressure: "rising"
        };
    }

    // ==========================
    // RP-04 CORE ENGINE (SIMULATED)
    // ==========================
    const rp04 = {
        stability: type === "cascade" ? 0.35 : 0.78,
        cascade_pressure: type === "cascade" ? 0.85 : 0.3,
        execution_mode: "deterministic"
    };

    const cascadeFactor = 1 - rp04.stability;

    // ==========================
    // SYSTEM STATE (SIMULATED)
    // ==========================
    const system = {
        fxStress: Math.random() * cascadeFactor,
        bankingStress: Math.random() * cascadeFactor,
        liquidityStress: Math.random() * cascadeFactor,
        equityStress: Math.random() * cascadeFactor,
        confidenceDrop: Math.random() * cascadeFactor
    };

    const fx = {
        usd_idr: 15000 + (cascadeFactor * 2000),
        pressure_score: rp04.cascade_pressure,
        regime: rp04.stability > 0.6 ? "STABLE" : "STRESSED"
    };

    const result = {
        final_state: rp04.stability > 0.6 ? "STABLE" : "RISK",
        rp04,
        system,
        fx
    };

    // LOG
    window.simulationLogs.push({
        timestamp: new Date().toISOString(),
        scenario,
        result
    });

    // STATUS
    document.getElementById("status").innerText = result.final_state;

    // FX PANEL
    document.getElementById("fx_value").innerText =
        "USD/IDR: " + fx.usd_idr.toFixed(0);

    document.getElementById("fx_pressure").innerText =
        "Pressure: " + fx.pressure_score.toFixed(2);

    document.getElementById("fx_regime").innerText =
        "Regime: " + fx.regime;

    document.getElementById("fx_bar").style.width =
        (fx.pressure_score * 100) + "%";

    // ==========================
    // NODE UPDATES (RP-04 WIRED)
    // ==========================
    setNode("rp04", rp04.stability);

    setNode("fx", system.fxStress * (1 + cascadeFactor));
    setNode("bank", system.bankingStress * (1 + cascadeFactor));
    setNode("liq", system.liquidityStress * (1 + cascadeFactor));
    setNode("eq", system.equityStress * (1 + cascadeFactor));
    setNode("conf", system.confidenceDrop * (1 + cascadeFactor));

    // LOG UI
    const logList = document.getElementById("log_list");

    logList.innerHTML = window.simulationLogs.map((l, i) => `
        <div style="border-bottom:1px solid #333;padding:5px;text-align:left;">
            <b>#${i+1}</b> ${l.timestamp}<br>
            ${l.scenario.name} → ${l.result.final_state}
        </div>
    `).join("");
}

</script>

</body>
</html>
