<!DOCTYPE html>
<html>
<head>
<title>Sextant Control Room v8 (Wired RP-04 Engine)</title>

<style>
body {
    font-family: Arial;
    background: #0b0f19;
    color: #e6f7ff;
    text-align: center;
}

button {
    margin: 8px;
    padding: 10px;
    background: black;
    color: #2bd4ff;
    border: 1px solid #2bd4ff;
    cursor: pointer;
}

.panel {
    border: 1px solid #2bd4ff;
    max-width: 800px;
    margin: 15px auto;
    padding: 15px;
    background: #111827;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 800px;
    margin: 20px auto;
}

.node {
    border: 1px solid #2bd4ff;
    padding: 15px;
    background: #111827;
}

.green { color: lime; border-color: lime; }
.amber { color: orange; border-color: orange; }
.red { color: red; border-color: red; }
.critical { color: magenta; border-color: magenta; }

pre {
    text-align: left;
    background: #0a0a0a;
    padding: 10px;
    font-size: 12px;
    overflow: auto;
}
</style>
</head>

<body>

<h2>SEXTANT CONTROL ROOM v8</h2>
<h3>Status: <span id="status">BOOTING</span></h3>

<div class="panel">
    <h3>MANUAL INPUT</h3>
    <input id="manualInput" placeholder="Type scenario (e.g. FX crash)" style="width:80%;padding:10px;">
    <button onclick="runManual()">Run Manual</button>
</div>

<button onclick="runSim('normal')">Normal</button>
<button onclick="runSim('failure')">Failure</button>
<button onclick="runSim('cascade')">Cascade</button>

<div class="grid">
    <div class="node" id="rp04">RP-04</div>
    <div class="node" id="fx">FX</div>
    <div class="node" id="bank">BANK</div>
    <div class="node" id="liq">LIQ</div>
    <div class="node" id="eq">EQ</div>
    <div class="node" id="conf">CONF</div>
</div>

<div class="panel">
    <h3>OUTPUT</h3>
    <div id="output">Waiting...</div>
</div>

<div class="panel">
    <h3>AUDIT LOG</h3>
    <div id="log"></div>
</div>

<script>

window.logs = [];
window.auditLog = [];

/* =========================
   SAFE BOOT GUARD
========================= */
(function bootCheck() {

    if (!window.runRP04) {
        window.runRP04 = function(type) {
            return {
                state: "SAFE_MODE",
                system: {
                    fx: 0.5,
                    bank: 0.5,
                    liq: 0.5,
                    eq: 0.5,
                    conf: 0.5
                },
                meta: { type }
            };
        };
    }

    if (!window.orchestra) {
        window.orchestra = {
            run: function(type) {
                return window.runRP04(type);
            }
        };
    }

})();

/* =========================
   NODE UPDATE
========================= */
function setNode(id, v) {
    const el = document.getElementById(id);

    let state =
        v < 0.3 ? "green" :
        v < 0.6 ? "amber" :
        v < 0.85 ? "red" : "critical";

    el.className = "node " + state;
    el.innerText = id.toUpperCase() + ": " + v.toFixed(2);
}

/* =========================
   MAIN SIMULATION RUN
========================= */
function runSim(type) {

    const frame = window.orchestra.run(type);
    const system = frame.system;
    const state = frame.state || "UNKNOWN";

    const audit = {
        riskScore: system.fx * 100,
        impact: type === "cascade" ? "System cascade failure"
               : type === "failure" ? "Localized instability"
               : "Stable operation",
        stability: system.conf * 100,
        grade: system.conf > 0.7 ? "A" : system.conf > 0.5 ? "B" : "C",
        status: state
    };

    const fullFrame = {
        frame,
        audit,
        timestamp: Date.now()
    };

    window.logs.push(fullFrame);
    window.auditLog.push(fullFrame);

    document.getElementById("status").innerText = state;

    document.getElementById("output").innerHTML =
        "<pre>" + JSON.stringify(fullFrame, null, 2) + "</pre>";

    setNode("rp04", system.conf);
    setNode("fx", system.fx);
    setNode("bank", system.bank);
    setNode("liq", system.liq);
    setNode("eq", system.eq);
    setNode("conf", system.conf);

    document.getElementById("log").innerHTML =
        window.logs.map((l,i) =>
            `<div>#${i} ${l.audit.status} | GRADE: ${l.audit.grade}</div>`
        ).join("");

    /* =========================
       🔷 AUDIT BRIDGE (NEW FIX)
    ========================= */

    window.dispatchEvent(new CustomEvent("sextant:run", {
        detail: fullFrame
    }));

    if (window.runAuditTest) {
        window.runAuditTest(fullFrame);
    }
}

/* =========================
   MANUAL INPUT
========================= */
function runManual() {
    const text = document.getElementById("manualInput").value.toLowerCase();

    let type = "normal";

    if (text.includes("crash") || text.includes("cascade") || text.includes("collapse")) {
        type = "cascade";
    } else if (text.includes("risk") || text.includes("drop")) {
        type = "failure";
    }

    runSim(type);
}

</script>

</body>
</html>
