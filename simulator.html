<!DOCTYPE html>
<html>
<head>
<title>Sextant Control Room v7</title>

<style>
body {
    font-family: Arial;
    background: #0b0f19;
    color: #e6f7ff;
    text-align: center;
}

button {
    margin: 8px;
    padding: 10px;
    background: black;
    color: #2bd4ff;
    border: 1px solid #2bd4ff;
    cursor: pointer;
}

.panel {
    border: 1px solid #2bd4ff;
    max-width: 700px;
    margin: 15px auto;
    padding: 15px;
    background: #111827;
    border-radius: 6px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    max-width: 700px;
    margin: 20px auto;
}

.node {
    border: 1px solid #2bd4ff;
    padding: 15px;
    background: #111827;
}

.green { color: lime; }
.amber { color: orange; }
.red { color: red; }
.critical { color: magenta; }

pre {
    text-align: left;
    background: #0a0a0a;
    padding: 10px;
    overflow: auto;
    font-size: 12px;
}
</style>
</head>

<body>

<h2>SEXTANT CONTROL ROOM v7</h2>

<h3>Status: <span id="status">BOOTING</span></h3>

<!-- CONTROLS -->
<button onclick="runSim('normal')">Normal</button>
<button onclick="runSim('failure')">Failure</button>
<button onclick="runSim('cascade')">Cascade</button>

<!-- FX PANEL -->
<div class="panel">
    <h3>FX PANEL (USD / IDR)</h3>

    <div id="fx_value">USD/IDR: --</div>
    <div id="fx_pressure">Pressure: --</div>
    <div id="fx_regime">Regime: --</div>

    <div style="height:10px;background:#111;border:1px solid #2bd4ff;margin-top:10px;">
        <div id="fx_bar" style="height:10px;width:0%;background:lime;"></div>
    </div>
</div>

<!-- NODES -->
<div class="grid">
    <div class="node" id="fx">FX NODE</div>
    <div class="node" id="bank">BANK NODE</div>
    <div class="node" id="liq">LIQUIDITY NODE</div>
    <div class="node" id="eq">EQUITY NODE</div>
    <div class="node" id="conf">CONFIDENCE NODE</div>
</div>

<!-- OUTPUT -->
<div class="panel">
    <h3>SIMULATION OUTPUT</h3>
    <div id="output">Waiting...</div>
</div>

<!-- LOGS -->
<div class="panel">
    <h3>SIMULATION LOGS</h3>
    <button onclick="exportPDF()">Export PDF Audit Report</button>
    <div id="log_list"></div>
</div>

<!-- ENGINE FILES -->
<script src="models/fx_model.js"></script>
<script src="models/contagion_model.js"></script>
<script src="core_engine/simulation_engine.js"></script>

<script>

// ==========================
// MEMORY STORE
// ==========================
window.simulationLogs = [];

// ==========================
// NODE UPDATE
// ==========================
function setNode(id, value) {

    const el = document.getElementById(id);
    value = value || 0;

    let state =
        value < 0.3 ? "green" :
        value < 0.6 ? "amber" :
        value < 0.85 ? "red" :
        "critical";

    el.className = "node " + state;
    el.innerText = id.toUpperCase() + ": " + value.toFixed(2);
}

// ==========================
// MAIN SIMULATION
// ==========================
function runSim(type) {

    const status = document.getElementById("status");
    const output = document.getElementById("output");

    let scenario = { name: "TEST" };

    if (type === "cascade") {
        scenario = {
            name: "STRESS TEST",
            oil_price: 110,
            capital_flow: "outflow",
            inflation_pressure: "rising"
        };
    }

    const result = runSimulation(scenario);

    window.lastResult = result;

    // STORE LOG
    window.simulationLogs.push({
        timestamp: new Date().toISOString(),
        scenario: scenario,
        result: result
    });

    // STATUS
    status.innerText = result.final_state || "UNKNOWN";

    // OUTPUT PANEL
    output.innerHTML = "<pre>" + JSON.stringify(result, null, 2) + "</pre>";

    // FX PANEL
    const fx = result?.fx || {};

    document.getElementById("fx_value").innerText =
        "USD/IDR: " + (fx.usd_idr ?? 0);

    document.getElementById("fx_pressure").innerText =
        "Pressure: " + (fx.pressure_score ?? 0);

    document.getElementById("fx_regime").innerText =
        "Regime: " + (fx.regime ?? "UNKNOWN");

    let bar = Math.min((fx.pressure_score || 0) * 100, 100);

    document.getElementById("fx_bar").style.width = bar + "%";
    document.getElementById("fx_bar").style.background =
        bar < 40 ? "lime" :
        bar < 70 ? "orange" :
        "red";

    // NODE UPDATE
    const s = result?.system || {};

    setNode("fx", s.fxStress);
    setNode("bank", s.bankingStress);
    setNode("liq", s.liquidityStress);
    setNode("eq", s.equityStress);
    setNode("conf", s.confidenceDrop);

    // LOG UI
    const logList = document.getElementById("log_list");

    logList.innerHTML = window.simulationLogs.map((l, i) => `
        <div style="border-bottom:1px solid #333;padding:5px;text-align:left;">
            <b>#${i+1}</b> ${l.timestamp}<br>
            ${l.scenario.name} → ${l.result.final_state}
        </div>
    `).join("");
}

// ==========================
// PDF EXPORT (AUDIT REPORT)
// ==========================
function exportPDF() {

    if (!window.simulationLogs.length) {
        alert("No logs available");
        return;
    }

    const report = window.simulationLogs.map(l => `
========================
TIME: ${l.timestamp}
SCENARIO: ${l.scenario.name}
STATE: ${l.result.final_state}

FX:
USD/IDR: ${l.result.fx?.usd_idr}
PRESSURE: ${l.result.fx?.pressure_score}
REGIME: ${l.result.fx?.regime}

SYSTEM:
FX: ${l.result.system?.fxStress}
BANK: ${l.result.system?.bankingStress}
LIQ: ${l.result.system?.liquidityStress}
EQ: ${l.result.system?.equityStress}
CONF: ${l.result.system?.confidenceDrop}
`).join("\n");

    const blob = new Blob([report], { type: "application/pdf" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "SEXTANT_AUDIT_REPORT.pdf";
    a.click();

    URL.revokeObjectURL(url);
}

</script>

</body>
</html>
