<script>
window.engineReady = false;

window.onload = function(){
    window.engineReady = true;
    document.getElementById("output").innerHTML = "✅ System Ready";
};

function runSim(type){

    const output = document.getElementById("output");
    const status = document.getElementById("status");

    if(!window.engineReady){
        output.innerHTML = "⏳ Engine still loading...";
        return;
    }

    try {

        if(type === "cascade"){

            if(typeof runSimulation !== "function"){
                output.innerHTML =
                "❌ ENGINE NOT LOADED<br>Check simulation_engine.js";
                return;
            }

            const result = runSimulation({
                name: "SAFE TEST",
                oil_price: 100
            });

            status.innerText = result?.final_state || "UNKNOWN";
            output.innerHTML =
                "<h3>RUN OK</h3><pre>" +
                JSON.stringify(result, null, 2) +
                "</pre>";

            return;
        }

        if(type === "normal"){
            status.innerText = "HEALTHY";
            output.innerHTML = "System OK";
            return;
        }

        if(type === "failure"){
            status.innerText = "DEGRADED";
            output.innerHTML = "Simulated failure OK";
            return;
        }

    } catch(e){
        output.innerHTML = "❌ ERROR: " + e.message;
    }
}
</script>
