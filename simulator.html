<script>

window.engine = {
    ready: false,
    lastHeartbeat: 0
};

// --------------------
// BOOT SEQUENCE
// --------------------
window.onload = function () {

    const output = document.getElementById("output");

    setTimeout(() => {

        if (typeof runSimulation !== "function") {
            output.innerHTML =
                "❌ ENGINE NOT LOADED → check /core_engine/simulation_engine.js";
            return;
        }

        window.engine.ready = true;
        window.engine.lastHeartbeat = Date.now();

        output.innerHTML =
            "✅ SYSTEM READY — ENGINE ONLINE";

    }, 300);
};

// --------------------
// HEARTBEAT
// --------------------
function engineAlive() {
    return Date.now() - window.engine.lastHeartbeat < 15000;
}

// --------------------
// SAFE RUN CONTROLLER
// --------------------
function runSim(type) {

    const output = document.getElementById("output");
    const status = document.getElementById("status");

    // SAFE MODE
    if (!window.engine.ready || !engineAlive()) {

        status.innerText = "SAFE MODE";

        output.innerHTML =
            type === "cascade"
                ? "⚠️ Cascade fallback mode"
                : "System fallback mode";

        return;
    }

    window.engine.lastHeartbeat = Date.now();

    try {

        if (typeof runSimulation !== "function") {
            throw new Error("ENGINE_RUNTIME_MISSING");
        }

        if (type === "cascade") {

            const result = runSimulation({
                name: "SYNTHETIC STRESS SCENARIO",
                oil_price: 105,
                capital_flow: "outflow",
                inflation_pressure: "rising"
            });

            window.lastSimulationResult = result;

            status.innerText = result.final_state || "UNKNOWN";

            output.innerHTML =
                "<h3>ENGINE OUTPUT</h3>" +
                "<pre>" +
                JSON.stringify(result, null, 2) +
                "</pre>";

            return;
        }

        if (type === "normal") {
            status.innerText = "HEALTHY";
            output.innerHTML = "SYSTEM OK";
            return;
        }

        if (type === "failure") {
            status.innerText = "DEGRADED";
            output.innerHTML = "CORE FAILURE SIMULATED";
            return;
        }

    } catch (e) {

        window.engine.ready = false;

        status.innerText = "RECOVERY MODE";
        output.innerHTML =
            "❌ ENGINE CRASH → SAFE MODE ACTIVATED";
    }
}

// --------------------
// AUDIT EXPORT
// --------------------
function exportAudit() {

    if (!window.lastSimulationResult) {
        alert("No simulation run");
        return;
    }

    const report = {
        report_id: "SEXTANT-" + Date.now(),
        timestamp: new Date().toISOString(),
        simulation: window.lastSimulationResult,
        engine: window.engine
    };

    const blob = new Blob(
        [JSON.stringify(report, null, 2)],
        { type: "application/json" }
    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = report.report_id + ".json";
    a.click();

    URL.revokeObjectURL(url);
}

</script>
