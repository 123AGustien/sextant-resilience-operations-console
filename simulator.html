<!DOCTYPE html>
<html>
<head>
<title>Sextant Control Room v8 (RP-04 Deterministic Engine)</title>

<style>
body {
    font-family: Arial;
    background: #0b0f19;
    color: #e6f7ff;
    text-align: center;
}

button {
    margin: 8px;
    padding: 10px;
    background: black;
    color: #2bd4ff;
    border: 1px solid #2bd4ff;
    cursor: pointer;
}

.panel {
    border: 1px solid #2bd4ff;
    max-width: 800px;
    margin: 15px auto;
    padding: 15px;
    background: #111827;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 800px;
    margin: 20px auto;
}

.node {
    border: 1px solid #2bd4ff;
    padding: 15px;
    background: #111827;
}

.green { color: lime; border-color: lime; }
.amber { color: orange; border-color: orange; }
.red { color: red; border-color: red; }
.critical { color: magenta; border-color: magenta; }

pre {
    text-align: left;
    background: #0a0a0a;
    padding: 10px;
    font-size: 12px;
    overflow: auto;
}
</style>
</head>

<body>

<h2>SEXTANT CONTROL ROOM v8</h2>
<h3>Status: <span id="status">BOOTING</span></h3>

<button onclick="runSim('normal')">Normal</button>
<button onclick="runSim('failure')">Failure</button>
<button onclick="runSim('cascade')">Cascade</button>

<div class="grid">
    <div class="node" id="rp04">RP-04</div>
    <div class="node" id="fx">FX</div>
    <div class="node" id="bank">BANK</div>
    <div class="node" id="liq">LIQ</div>
    <div class="node" id="eq">EQ</div>
    <div class="node" id="conf">CONF</div>
</div>

<div class="panel">
    <h3>OUTPUT</h3>
    <div id="output">Waiting...</div>
</div>

<div class="panel">
    <h3>AUDIT LOG</h3>
    <div id="log"></div>
</div>

<script>

window.logs = [];

/* =========================
   NODE RENDER
========================= */
function setNode(id, v) {
    const el = document.getElementById(id);

    let state =
        v < 0.3 ? "green" :
        v < 0.6 ? "amber" :
        v < 0.85 ? "red" : "critical";

    el.className = "node " + state;
    el.innerText = id.toUpperCase() + ": " + v.toFixed(2);
}

/* =========================
   RP-04 CORE
========================= */
function runSim(type) {

    const rp04 = {
        stability: type === "cascade" ? 0.35 : type === "failure" ? 0.6 : 0.78,
        pressure: type === "cascade" ? 0.9 : type === "failure" ? 0.5 : 0.3
    };

    const fx = rp04.pressure;

    /* =========================
       TRUE CASCADE (DETERMINISTIC)
    ========================= */

    const bank = fx * 0.85;
    const liq  = bank * 0.90;
    const eq   = liq * 0.92;
    const conf = eq * 0.95;

    const system = { fx, bank, liq, eq, conf };

    const state = rp04.stability > 0.6 ? "STABLE" : "RISK";

    const result = { rp04, system, state };

    /* LOG */
    window.logs.push(result);

    /* UI */
    document.getElementById("status").innerText = state;

    document.getElementById("output").innerHTML =
        "<pre>" + JSON.stringify(result, null, 2) + "</pre>";

    setNode("rp04", rp04.stability);
    setNode("fx", fx);
    setNode("bank", bank);
    setNode("liq", liq);
    setNode("eq", eq);
    setNode("conf", conf);

    document.getElementById("log").innerHTML =
        window.logs.map((l,i) =>
            `<div>#${i} ${l.state}</div>`
        ).join("");
}

</script>

</body>
</html>
