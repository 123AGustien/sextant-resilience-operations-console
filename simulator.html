<script>

window.engine = {
    ready: false,
    healthy: false,
    lastHeartbeat: null
};

// -----------------------------
// BOOT SEQUENCE (SAFE INIT)
// -----------------------------
window.onload = function () {

    const output = document.getElementById("output");

    setTimeout(() => {

        try {

            if (typeof runSimulation !== "function") {
                output.innerHTML = "❌ Engine not loaded (simulation_engine.js missing)";
                window.engine.ready = false;
                window.engine.healthy = false;
                return;
            }

            window.engine.ready = true;
            window.engine.healthy = true;
            window.engine.lastHeartbeat = Date.now();

            output.innerHTML = "✅ System Ready (Unified Controller Active)";

        } catch (e) {
            output.innerHTML = "❌ Boot error: " + e.message;
            window.engine.ready = false;
            window.engine.healthy = false;
        }

    }, 300);
};

// -----------------------------
// HEARTBEAT CHECK (ANTI-FREEZE)
// -----------------------------
function engineHeartbeat() {
    if (!window.engine.lastHeartbeat) return false;

    const now = Date.now();
    return (now - window.engine.lastHeartbeat) < 10000; // 10s safety window
}

// -----------------------------
// CORE SAFE RUN FUNCTION
// -----------------------------
function runSim(type) {

    const output = document.getElementById("output");
    const status = document.getElementById("status");

    // -------------------------
    // SAFE MODE GATE
    // -------------------------
    if (!window.engine.ready || !window.engine.healthy || !engineHeartbeat()) {

        if (type === "cascade") {
            status.innerText = "SAFE MODE";
            output.innerHTML = "⚠️ Engine offline — fallback simulation active";
        }

        if (type === "normal") {
            status.innerText = "HEALTHY (SAFE)";
            output.innerHTML = "System operating in fallback mode";
        }

        if (type === "failure") {
            status.innerText = "DEGRADED (SAFE)";
            output.innerHTML = "Simulated failure (fallback mode)";
        }

        return;
    }

    // refresh heartbeat
    window.engine.lastHeartbeat = Date.now();

    // -------------------------
    // ENGINE MODE (PRIMARY PATH)
    // -------------------------
    try {

        if (type === "cascade") {

            const result = runSimulation({
                name: "UNIFIED STRESS SCENARIO",
                oil_price: 105,
                capital_flow: "outflow",
                inflation_pressure: "rising",
                msci_sentiment: "negative"
            });

            if (!result) throw new Error("Empty engine response");

            window.lastSimulationResult = result;

            status.innerText = result.final_state || "UNKNOWN";

            status.style.color =
                result.final_state === "GREEN" ? "#00ff00" :
                result.final_state === "AMBER" ? "#ffcc00" :
                result.final_state === "RED" ? "#ff0000" :
                "#ffffff";

            output.innerHTML =
                "<h3>UNIFIED ENGINE OUTPUT</h3>" +
                "<pre style='white-space:pre-wrap;'>" +
                JSON.stringify(result, null, 2) +
                "</pre>";

            return;
        }

        if (type === "normal") {
            status.innerText = "HEALTHY";
            output.innerHTML = "System OK";
            return;
        }

        if (type === "failure") {
            status.innerText = "DEGRADED";
            output.innerHTML = "Core failure simulated (safe execution)";
            return;
        }

    } catch (e) {

        // -------------------------
        // CRASH RECOVERY LAYER
        // -------------------------
        console.error(e);

        window.engine.ready = false;
        window.engine.healthy = false;

        status.innerText = "RECOVERY MODE";
        output.innerHTML =
            "❌ Engine crash detected<br>" +
            "Switched to safe fallback mode";

    }
}

// -----------------------------
// SAFE AUDIT EXPORT
// -----------------------------
function exportAudit() {

    if (!window.lastSimulationResult) {
        alert("No simulation available");
        return;
    }

    const report = {
        report_id: "UNIFIED-" + Date.now(),
        timestamp: new Date().toISOString(),
        system_state: window.engine,
        simulation: window.lastSimulationResult
    };

    const blob = new Blob(
        [JSON.stringify(report, null, 2)],
        { type: "application/json" }
    );

    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = report.report_id + ".json";
    a.click();

    URL.revokeObjectURL(url);
}

</script>
