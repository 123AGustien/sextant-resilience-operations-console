<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sextant Simulator Control Room</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style.css">
</head>

<body>

  <!-- ================= HEADER ================= -->
  <div class="header">
    <h1>Sextant Resilience Simulator</h1>
    <p>Scenario Failure Simulation Control Room</p>
  </div>

  <!-- ================= CONTROLS ================= -->
  <div class="panel">
    <button onclick="runSimulation()">Run Simulation</button>
    <button onclick="resetSimulation()">Reset</button>

    <select id="scenarioSelect"></select>
  </div>

  <!-- ================= DASHBOARD ================= -->
  <div class="grid">

    <div class="card">
      <h3>Export Index</h3>
      <div id="exportIndex">0</div>
    </div>

    <div class="card">
      <h3>Electronics</h3>
      <div id="electronics">0</div>
    </div>

    <div class="card">
      <h3>Non-Tech</h3>
      <div id="nonTech">0</div>
    </div>

    <div class="card">
      <h3>Shock Level</h3>
      <div id="shock">0</div>
    </div>

  </div>

  <!-- ================= AUDIT OUTPUT ================= -->
  <div class="card">
    <h3>Audit Output</h3>
    <pre id="auditLog">Awaiting audit...</pre>
  </div>

  <!-- ================= EVENT LOG ================= -->
  <div class="log" id="log"></div>

  <!-- ================= CORE SYSTEM ================= -->
  <script src="../config.js"></script>
  <script src="../data.js"></script>
  <script src="../scenarios.js"></script>
  <script src="../engine.js"></script>

  <!-- ================= AUDIT LAYER ================= -->
  <script src="../audit_bridge.js"></script>

  <!-- ================= VISUAL LAYER ================= -->
  <script src="../visual.js"></script>

  <!-- ================= CONTROLLER ================= -->
  <script src="../app.js"></script>

  <!-- ================= SAFE BOOT FIX ================= -->
  <script>

    function safe(val, fallback = 0) {
      return (val === undefined || val === null) ? fallback : val;
    }

    function runSimulation() {

      try {

        const engine = window.engine;

        if (!engine || typeof engine.runSimulation !== "function") {
          throw new Error("Engine not loaded or invalid");
        }

        const scenarioSelect = document.getElementById("scenarioSelect");
        const scenario = scenarioSelect ? scenarioSelect.value : "default";

        const result = engine.runSimulation(scenario);

        if (!result) {
          throw new Error("Simulation returned empty result");
        }

        // SAFE RESULT WRAPPER
        const safeResult = {
          scenario: safe(result.scenario, "UNKNOWN"),
          exportIndex: safe(result.exportIndex),
          electronics: safe(result.electronics),
          nonTech: safe(result.nonTech),
          shock: safe(result.shock)
        };

        // SAFE AUDIT
        let audit = null;

        try {
          if (typeof window.auditScenarioResult === "function") {
            audit = window.auditScenarioResult(
              safeResult.scenario,
              {
                riskScore: safeResult.shock,
                impact: safeResult.exportIndex,
                stability: 100 - safeResult.shock
              }
            );
          } else {
            audit = { status: "audit_bridge_missing" };
          }
        } catch (e) {
          audit = {
            status: "audit_failed",
            error: e.message
          };
        }

        safeResult.audit = audit;

        // SAFE UI UPDATE
        if (typeof updateUI === "function") {
          updateUI(safeResult);
        }

        document.getElementById("auditLog").innerText =
          JSON.stringify(audit, null, 2);

      } catch (err) {

        console.error("Simulation crash:", err);

        document.getElementById("auditLog").innerText =
          "SYSTEM ERROR: " + err.message;
      }
    }

    function resetSimulation() {

      try {

        if (typeof window.reset === "function") {
          window.reset();
        }

        document.getElementById("auditLog").innerText =
          "Awaiting audit...";

      } catch (err) {
        console.error("Reset error:", err);
      }
    }

  </script>

</body>
</html>
