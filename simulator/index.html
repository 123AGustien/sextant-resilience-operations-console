<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sextant Strategic Command Center</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style.css">
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <h1>Sextant Strategic Command Center</h1>
    <p>Global Resilience Intelligence Platform</p>
  </div>

  <!-- SCENARIO LIBRARY -->
  <div class="panel">

    <button onclick="runScenario('US–China Trade Escalation')">US–China Trade Escalation</button>
    <button onclick="runScenario('Taiwan Strait Crisis')">Taiwan Strait Crisis</button>
    <button onclick="runScenario('Semiconductor Supply Shock')">Semiconductor Supply Shock</button>
    <button onclick="runScenario('Energy Market Disruption')">Energy Market Disruption</button>
    <button onclick="runScenario('Global Recession')">Global Recession</button>

    <button onclick="orchestra?.runAll()">Run Full Sequence</button>

  </div>

  <!-- DASHBOARD -->
  <div class="grid">

    <div class="card">
      <h3>Risk Index</h3>
      <div id="riskIndex">--</div>
    </div>

    <div class="card">
      <h3>Impact</h3>
      <div id="impact">--</div>
    </div>

    <div class="card">
      <h3>Audit Status</h3>
      <div id="auditStatus">awaiting execution...</div>
    </div>

  </div>

  <!-- EXECUTIVE BRIEFING -->
  <div class="card">
    <h3>Executive Intelligence Briefing</h3>
    <pre id="auditLog">Run a scenario to generate output...</pre>
  </div>

  <!-- EVENT LOG -->
  <div class="log" id="log"></div>

  <!-- =========================
       CORE SYSTEM
  ========================= -->
  <script src="../config.js"></script>
  <script src="../data.js"></script>
  <script src="../scenarios.js"></script>

  <!-- ENGINE -->
  <script src="../rp04-engine.js"></script>

  <!-- AUDIT -->
  <script src="../audit_bridge.js"></script>
  <script src="../audit_self_test.js"></script>

  <!-- ORCHESTRA -->
  <script src="../orchestra_engine.js"></script>

  <!-- CONTROL LAYER -->
  <script src="../runScenario.js"></script>

  <!-- EVENT BUS (REQUIRED) -->
  <script src="../event_bus.js"></script>

  <!-- BOOTSTRAP -->
  <script>
    window.addEventListener("load", () => {

      console.log("🧠 Sextant Command Center Booted");

      if (window.selfTestRP04) {
        console.log("🧪 SELF TEST:", selfTestRP04());
      }

      if (!window.runScenario) {
        console.error("❌ runScenario missing");
      }

      if (!window.orchestra) {
        console.error("❌ orchestra missing");
      }

      // =========================
      // UNIFIED EVENT LISTENER
      // =========================
      if (window.SextantBus) {

        window.SextantBus.on((frame) => {

          const audit = frame?.audit || {};

          const risk = document.getElementById("riskIndex");
          const impact = document.getElementById("impact");
          const status = document.getElementById("auditStatus");
          const log = document.getElementById("auditLog");

          if (risk) risk.innerText = audit.riskScore ?? "--";
          if (impact) impact.innerText = audit.impact ?? "--";
          if (status) status.innerText = audit.status ?? "ACTIVE";

          if (log) {
            log.innerText = JSON.stringify(frame, null, 2);
          }

          console.log("📡 FRAME:", frame);
        });

      } else {
        console.error("❌ SextantBus not loaded");
      }

    });
  </script>

</body>
</html>
