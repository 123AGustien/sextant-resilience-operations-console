<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sextant Simulator Control Room</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style.css">
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <h1>Sextant Resilience Simulator</h1>
    <p>Scenario Failure Simulation Control Room</p>
  </div>

  <!-- CONTROLS -->
  <div class="panel">
    <button onclick="runSimulation()">Run Simulation</button>
    <button onclick="resetSimulation()">Reset</button>

    <select id="scenarioSelect">
      <option value="normal">Normal</option>
      <option value="failure">Failure</option>
      <option value="cascade">Cascade</option>
    </select>
  </div>

  <!-- DASHBOARD -->
  <div class="grid">

    <div class="card">
      <h3>Export Index</h3>
      <div id="exportIndex">0</div>
    </div>

    <div class="card">
      <h3>Electronics</h3>
      <div id="electronics">0</div>
    </div>

    <div class="card">
      <h3>Non-Tech</h3>
      <div id="nonTech">0</div>
    </div>

    <div class="card">
      <h3>Shock Level</h3>
      <div id="shock">0</div>
    </div>

  </div>

  <!-- AUDIT OUTPUT -->
  <div class="card">
    <h3>Audit Output</h3>
    <pre id="auditLog">Awaiting audit...</pre>
  </div>

  <!-- EVENT LOG -->
  <div class="log" id="log"></div>

  <!-- CORE SYSTEM -->
  <script src="../config.js"></script>
  <script src="../data.js"></script>
  <script src="../scenarios.js"></script>

  <!-- ENGINE -->
  <script src="../engine.js"></script>

  <!-- BRIDGE (CRITICAL) -->
  <script src="../audit_bridge.js"></script>

  <!-- VISUAL LAYER -->
  <script src="../visual.js"></script>

  <!-- APP CONTROLLER -->
  <script src="../app.js"></script>

  <!-- ================= CONTROL BOOTSTRAP ================= -->
  <script>

    function runSimulation() {

        const scenario = document.getElementById("scenarioSelect").value;

        // 1. RUN ENGINE (ONLY SOURCE OF TRUTH)
        const result = window.runEngine
            ? window.runEngine(scenario)
            : window.engine.runSimulation(scenario);

        // 2. UI UPDATE (if exists)
        if (window.updateUI) {
            window.updateUI(result);
        }

        // 3. AUTO AUDIT VIA BRIDGE (NO MANUAL BUILD)
        if (window.SextantBridge && window.SextantBridge.captureSimulationResult) {

            const audit = window.SextantBridge.captureSimulationResult(result);

            document.getElementById("auditLog").innerText =
                JSON.stringify(audit, null, 2);
        }
    }

    function resetSimulation() {

        if (window.reset) window.reset();

        document.getElementById("auditLog").innerText =
            "Awaiting audit...";
    }

  </script>

</body>
</html>
