<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sextant Simulator Control Room</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style.css">
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <h1>Sextant Resilience Simulator</h1>
    <p>Scenario Failure Simulation Control Room</p>
  </div>

  <!-- CONTROLS -->
  <div class="panel">

    <button onclick="runSimulation()">Run Simulation</button>
    <button onclick="resetSimulation()">Reset</button>

    <button onclick="orchestra?.runAll()">
      Run Full Sequence
    </button>

    <select id="scenarioSelect">
      <option value="normal">Normal</option>
      <option value="failure">Failure</option>
      <option value="cascade">Cascade</option>
    </select>

  </div>

  <!-- DASHBOARD -->
  <div class="grid">

    <div class="card">
      <h3>Export Index</h3>
      <div id="exportIndex">0</div>
    </div>

    <div class="card">
      <h3>Electronics</h3>
      <div id="electronics">0</div>
    </div>

    <div class="card">
      <h3>Non-Tech</h3>
      <div id="nonTech">0</div>
    </div>

    <div class="card">
      <h3>Shock Level</h3>
      <div id="shock">0</div>
    </div>

  </div>

  <!-- AUDIT OUTPUT -->
  <div class="card">
    <h3>Audit Output</h3>
    <pre id="auditLog">Awaiting audit...</pre>
  </div>

  <!-- EVENT LOG -->
  <div class="log" id="log"></div>

  <!-- CORE SYSTEM -->
  <script src="../config.js"></script>
  <script src="../data.js"></script>
  <script src="../scenarios.js"></script>

  <!-- RP-04 ENGINE (SOURCE OF TRUTH) -->
  <script src="../rp04-engine.js"></script>

  <!-- AUDIT BRIDGE -->
  <script src="../audit_bridge.js"></script>

  <!-- SELF TEST LAYER -->
  <script src="../audit_self_test.js"></script>

  <!-- ORCHESTRA LAYER -->
  <script src="../orchestra_engine.js"></script>

  <!-- VISUAL LAYER -->
  <script src="../visual.js"></script>

  <!-- APP CONTROLLER -->
  <script src="../app.js"></script>

  <!-- ================= CONTROL BOOTSTRAP ================= -->
  <script>

    function runSimulation() {

        const scenario =
            document.getElementById("scenarioSelect").value;

        if (!window.orchestra) {
            console.error("Orchestra not loaded");
            return;
        }

        // ORCHESTRATION ENTRY POINT
        const frame = window.orchestra.run(scenario);

        if (!frame) return;

        // UI UPDATE (optional layer)
        window.updateUI?.(frame);

        // AUDIT DISPLAY
        const auditLog = document.getElementById("auditLog");

        if (auditLog && frame.audit) {
            auditLog.innerText =
                JSON.stringify(frame.audit, null, 2);
        }

        // EVENT STREAM (CONTROL CENTER SYNC)
        window.dispatchEvent(
            new CustomEvent("sextant:run", {
                detail: frame
            })
        );
    }

    function resetSimulation() {

        window.orchestra?.reset();

        document.getElementById("auditLog").innerText =
            "Awaiting audit...";
    }

  </script>

</body>
</html>
