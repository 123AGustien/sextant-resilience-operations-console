<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sextant Simulator Control Room</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="../style.css">
</head>

<body>

  <!-- HEADER -->
  <div class="header">
    <h1>Sextant Resilience Simulator</h1>
    <p>Scenario Failure Simulation Control Room</p>
  </div>

  <!-- CONTROLS -->
  <div class="panel">
    <button onclick="runSimulation()">Run Simulation</button>
    <button onclick="resetSimulation()">Reset</button>

    <select id="scenarioSelect">
      <option value="normal">Normal</option>
      <option value="failure">Failure</option>
      <option value="cascade">Cascade</option>
    </select>
  </div>

  <!-- DASHBOARD -->
  <div class="grid">

    <div class="card">
      <h3>Export Index</h3>
      <div id="exportIndex">0</div>
    </div>

    <div class="card">
      <h3>Electronics</h3>
      <div id="electronics">0</div>
    </div>

    <div class="card">
      <h3>Non-Tech</h3>
      <div id="nonTech">0</div>
    </div>

    <div class="card">
      <h3>Shock Level</h3>
      <div id="shock">0</div>
    </div>

  </div>

  <!-- AUDIT OUTPUT -->
  <div class="card">
    <h3>Audit Output</h3>
    <pre id="auditLog">Awaiting audit...</pre>
  </div>

  <!-- EVENT LOG -->
  <div class="log" id="log"></div>

  <!-- CORE SYSTEM -->
  <script src="../config.js"></script>
  <script src="../data.js"></script>
  <script src="../scenarios.js"></script>

  <!-- ENGINE -->
  <script src="../engine.js"></script>

  <!-- BRIDGE (CRITICAL) -->
  <script src="../audit_bridge.js"></script>

  <!-- VISUAL LAYER -->
  <script src="../visual.js"></script>

  <!-- APP CONTROLLER -->
  <script src="../app.js"></script>

  <!-- ================= CONTROL BOOTSTRAP ================= -->
  <script>

    function runSimulation() {

        const scenario = document.getElementById("scenarioSelect").value;

        // 1. ENGINE (single source of truth)
        const result =
            (window.runEngine && window.runEngine(scenario)) ||
            (window.engine?.runSimulation?.(scenario));

        if (!result) {
            console.error("Engine returned no result");
            return;
        }

        // 2. NORMALIZED FRAME (IMPORTANT FOR BRIDGE)
        const frame = {
            rp04: result.rp04 || {},
            system: result.system || {},
            state: result.state || "UNKNOWN",
            scenario: result.scenario || scenario,
            timestamp: Date.now()
        };

        // 3. UI UPDATE
        if (window.updateUI) {
            window.updateUI(frame);
        }

        // 4. AUDIT PIPE (BRIDGE-NATIVE)
        let audit = null;

        if (window.SextantBridge?.captureSimulationResult) {
            audit = window.SextantBridge.captureSimulationResult(frame);
        }

        frame.audit = audit;

        // 5. AUDIT DISPLAY
        const auditLog = document.getElementById("auditLog");
        if (auditLog) {
            auditLog.innerText = JSON.stringify(audit || {}, null, 2);
        }

        // 6. EVENT STREAM (CONTROL ROOM SYNC)
        window.dispatchEvent(new CustomEvent("sextant:run", {
            detail: frame
        }));
    }

    function resetSimulation() {

        if (window.reset) window.reset();

        document.getElementById("auditLog").innerText =
            "Awaiting audit...";
    }

  </script>

</body>
</html>
