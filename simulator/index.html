<script>

function safe(val, fallback = "--") {
  return (val === undefined || val === null) ? fallback : val;
}

function safeFrame(frame) {
  return frame || {
    audit: {
      riskScore: 0,
      impact: 0,
      status: "NO_DATA"
    }
  };
}

window.addEventListener("load", () => {

  console.log("🧠 Sextant Command Center Booted (STABLE MODE)");

  /* =========================
     SYSTEM CHECKS
  ========================= */

  if (typeof window.selfTestRP04 === "function") {
    try {
      console.log("🧪 SELF TEST:", selfTestRP04());
    } catch (e) {
      console.error("Self test failed:", e);
    }
  }

  if (typeof window.runScenario !== "function") {
    console.error("❌ runScenario missing");
  }

  if (!window.orchestra) {
    console.error("❌ orchestra missing");
  }

  /* =========================
     SAFE EVENT BUS LISTENER
  ========================= */

  if (window.SextantBus && typeof window.SextantBus.on === "function") {

    window.SextantBus.on((frame) => {

      try {

        const frameData = safeFrame(frame);
        const audit = frameData.audit || {};

        const riskEl = document.getElementById("riskIndex");
        const impactEl = document.getElementById("impact");
        const statusEl = document.getElementById("auditStatus");
        const logEl = document.getElementById("auditLog");

        if (riskEl) {
          riskEl.innerText = safe(audit.riskScore);
        }

        if (impactEl) {
          impactEl.innerText = safe(audit.impact);
        }

        if (statusEl) {
          statusEl.innerText = safe(audit.status, "ACTIVE");
        }

        if (logEl) {
          logEl.innerText = JSON.stringify(frameData, null, 2);
        }

      } catch (err) {
        console.error("FRAME RENDER ERROR:", err);

        const statusEl = document.getElementById("auditStatus");
        if (statusEl) {
          statusEl.innerText = "RENDER ERROR (SAFE MODE)";
        }
      }

    });

  } else {
    console.error("❌ SextantBus not loaded");

    const statusEl = document.getElementById("auditStatus");
    if (statusEl) {
      statusEl.innerText = "EVENT BUS OFFLINE";
    }
  }

});

</script>
