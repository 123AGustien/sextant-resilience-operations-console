<!DOCTYPE html>
<html>
<head>
<title>Sextant Control Room</title>

<style>
body{
    font-family:Arial;
    background:#0b0f19;
    color:#00ffcc;
    text-align:center;
}

button{
    padding:10px;
    margin:5px;
    background:black;
    color:#00ffcc;
    border:1px solid #00ffcc;
    cursor:pointer;
}

#output{
    margin-top:20px;
    padding:10px;
    border:1px solid #00ffcc;
}

#impactBox{
    margin-top:20px;
    border:1px solid #00ffcc;
    padding:10px;
}

#log{
    margin-top:20px;
    border:1px solid #00ffcc;
    height:200px;
    overflow-y:auto;
    padding:10px;
    text-align:left;
}

#status{
    font-weight:bold;
    font-size:20px;
}

.node{
    display:inline-block;
    padding:10px;
    margin:10px;
    border:1px solid #00ffcc;
}

.healthy{ color:#00ff00; }
.degraded{ color:#ffcc00; }
.failed{ color:#ff0000; }
</style>

</head>

<body>

<h1>SEXTANT CONTROL ROOM</h1>

<h2>
System Status:
<span id="status">HEALTHY</span>
</h2>

<div>
<div class="node" id="core">CORE BANKING</div>
<div class="node" id="payment">PAYMENT GATEWAY</div>
<div class="node" id="mobile">MOBILE BANKING</div>
</div>

<button onclick="runSim('normal')">Normal Operation</button>
<button onclick="runSim('failure')">Core Banking Failure</button>
<button onclick="runSim('cascade')">Cascade Failure</button>

<div id="output">Awaiting simulation...</div>

<div id="impactBox">
<h3>Impact Analysis</h3>
<p>Impact: <span id="impact">-</span></p>
<p>Services: <span id="services">-</span></p>
</div>

<h3>Incident Timeline</h3>
<div id="log">System initialized.</div>

<script>

function now(){
    return new Date().toLocaleTimeString();
}

function log(msg){
    const logBox = document.getElementById("log");
    logBox.innerHTML += "<br>[" + now() + "] " + msg;
    logBox.scrollTop = logBox.scrollHeight;
}

function setNode(id, state){
    const el = document.getElementById(id);
    el.className = "node " + state;
}

function setStatus(state){
    const status = document.getElementById("status");

    status.innerText = state;

    if(state==="HEALTHY") status.style.color="#00ff00";
    if(state==="DEGRADED") status.style.color="#ffcc00";
    if(state==="CRITICAL") status.style.color="#ff0000";
}

function updateImpact(i,s){
    document.getElementById("impact").innerText = i;
    document.getElementById("services").innerText = s;
}

function resetNodes(){
    setNode("core","healthy");
    setNode("payment","healthy");
    setNode("mobile","healthy");
}

function runSim(type){

    document.getElementById("log").innerHTML="System initialized.";

    resetNodes();

    log("SIMULATION START: " + type.toUpperCase());

    if(type==="normal"){

        setStatus("HEALTHY");
        updateImpact("LOW","All services operational");

        log("NO FAILURE DETECTED");

        return;
    }

    if(type==="failure"){

        setNode("core","failed");
        setNode("payment","degraded");
        setNode("mobile","degraded");

        setStatus("CRITICAL");

        updateImpact("HIGH","Payment + Mobile impacted");

        log("CORE BANKING FAILED");
        log("PAYMENT GATEWAY DEGRADED");
        log("MOBILE BANKING DEGRADED");

        return;
    }

    if(type==="cascade"){

        setNode("core","failed");
        setNode("payment","failed");
        setNode("mobile","degraded");

        setStatus("CRITICAL");

        updateImpact("VERY HIGH","Core + Payment impacted");

        log("CORE BANKING FAILED");
        log("PAYMENT GATEWAY FAILED");
        log("MOBILE BANKING DEGRADED");

        return;
    }
}

</script>

</body>
</html>
