<!DOCTYPE html>
<html>
<head>
<title>Sextant Control Room v5 Evidence Engine</title>

<style>
body{
    font-family:Arial;
    background:#0b0f19;
    color:#00ffcc;
    text-align:center;
}

button{
    padding:10px;
    margin:5px;
    background:black;
    color:#00ffcc;
    border:1px solid #00ffcc;
    cursor:pointer;
}

#output{
    margin-top:20px;
    padding:10px;
    border:1px solid #00ffcc;
}

#log{
    margin-top:20px;
    border:1px solid #00ffcc;
    height:200px;
    overflow-y:auto;
    padding:10px;
    text-align:left;
}

#status{
    font-weight:bold;
    font-size:20px;
}

#panel{
    margin-top:20px;
    border:1px solid #00ffcc;
    padding:10px;
    text-align:left;
}

/* GRAPH */
.graph{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:20px;
}

.node{
    border:1px solid #00ffcc;
    padding:10px;
    width:140px;
    cursor:pointer;
}

.healthy{ color:#00ff00; }
.degraded{ color:#ffcc00; }
.failed{ color:#ff0000; }
</style>

</head>

<body>

<h1>SEXTANT CONTROL ROOM</h1>

<h2>
System Status:
<span id="status">HEALTHY</span>
</h2>

<div class="graph">
    <div id="core" class="node healthy" onclick="fail('core')">CORE BANKING</div>
    <div id="payment" class="node healthy" onclick="fail('payment')">PAYMENT</div>
    <div id="mobile" class="node healthy" onclick="fail('mobile')">MOBILE</div>
</div>

<button onclick="resetSystem()">Reset</button>
<button onclick="runCascade()">Run Scenario</button>
<button onclick="exportEvidence()">Export Evidence Pack</button>

<div id="output">Awaiting simulation...</div>

<h3>Incident Log</h3>
<div id="log">System initialized.</div>

<h3>Evidence Panel</h3>
<pre id="panel">No evidence generated.</pre>

<script>

/* ---------------------------
   STATE + EVIDENCE STORE
----------------------------*/

const evidence = {
    scenarioId: null,
    startTime: null,
    endTime: null,
    events: [],
    finalState: null
};

/* ---------------------------
   UTILITIES
----------------------------*/

function now(){
    return new Date().toISOString();
}

function log(msg,type="INFO"){

    const box = document.getElementById("log");
    const time = new Date().toLocaleTimeString();

    const entry = {
        time: now(),
        type: type,
        message: msg
    };

    evidence.events.push(entry);

    box.innerHTML += `<br>[${time}] ${msg}`;
    box.scrollTop = box.scrollHeight;
}

/* ---------------------------
   NODE CONTROL
----------------------------*/

function setNode(id,state){
    document.getElementById(id).className = "node " + state;
}

/* ---------------------------
   RESET
----------------------------*/

function resetSystem(){

    evidence.scenarioId = "SCN-" + Math.floor(Math.random()*99999);
    evidence.startTime = now();
    evidence.events = [];

    setNode("core","healthy");
    setNode("payment","healthy");
    setNode("mobile","healthy");

    document.getElementById("status").innerText = "HEALTHY";
    document.getElementById("status").style.color = "#00ff00";

    document.getElementById("log").innerHTML = "System initialized.";
    document.getElementById("panel").innerText = "Evidence reset.";

    log("SYSTEM RESET");
}

/* ---------------------------
   FAILURE INJECTION
----------------------------*/

function fail(node){

    log(node.toUpperCase() + " FAILURE INJECTED","FAIL");

    setNode(node,"failed");

    propagate(node);
    evaluate();
}

/* ---------------------------
   PROPAGATION RULES
----------------------------*/

function propagate(node){

    if(node === "core"){

        setTimeout(()=>{
            setNode("payment","degraded");
            log("PAYMENT DEGRADED (dependency on CORE)");
        },500);

        setTimeout(()=>{
            setNode("mobile","degraded");
            log("MOBILE DEGRADED (cascade from PAYMENT)");
        },1000);
    }

    if(node === "payment"){

        setTimeout(()=>{
            setNode("mobile","degraded");
            log("MOBILE DEGRADED (dependency on PAYMENT)");
        },500);
    }
}

/* ---------------------------
   SYSTEM STATE
----------------------------*/

function evaluate(){

    const core = document.getElementById("core").className;
    const payment = document.getElementById("payment").className;

    let state = "HEALTHY";

    if(core.includes("failed")) state = "CRITICAL";
    else if(payment.includes("failed")) state = "DEGRADED";

    document.getElementById("status").innerText = state;

    if(state==="HEALTHY") document.getElementById("status").style.color="#00ff00";
    if(state==="DEGRADED") document.getElementById("status").style.color="#ffcc00";
    if(state==="CRITICAL") document.getElementById("status").style.color="#ff0000";

    evidence.finalState = state;
}

/* ---------------------------
   SCENARIO RUNNER
----------------------------*/

function runCascade(){

    resetSystem();

    log("SCENARIO START: CASCADE TEST");

    setTimeout(()=>fail("core"),500);

    setTimeout(()=>{
        evidence.endTime = now();
        generateEvidence();
    },2500);
}

/* ---------------------------
   EVIDENCE ENGINE
----------------------------*/

function generateEvidence(){

    const pack = {
        scenarioId: evidence.scenarioId,
        startTime: evidence.startTime,
        endTime: evidence.endTime,
        totalEvents: evidence.events.length,
        finalState: evidence.finalState,
        events: evidence.events
    };

    document.getElementById("panel").innerText =
        JSON.stringify(pack, null, 2);

    log("EVIDENCE PACK GENERATED");
}

/* ---------------------------
   EXPORT
----------------------------*/

function exportEvidence(){

    const data = document.getElementById("panel").innerText;

    const blob = new Blob([data], {type:"application/json"});
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "sextant_evidence_pack.json";
    a.click();

    log("EVIDENCE EXPORTED");
}

</script>

</body>
</html>
