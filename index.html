<!DOCTYPE html>
<html>
<head>
<title>Sextant Control Room v6 Risk Engine</title>

<style>
body{
    font-family:Arial;
    background:#0b0f19;
    color:#00ffcc;
    text-align:center;
}

button{
    padding:10px;
    margin:5px;
    background:black;
    color:#00ffcc;
    border:1px solid #00ffcc;
    cursor:pointer;
}

#output{
    margin-top:20px;
    padding:10px;
    border:1px solid #00ffcc;
}

#log{
    margin-top:20px;
    border:1px solid #00ffcc;
    height:200px;
    overflow-y:auto;
    padding:10px;
    text-align:left;
}

#status{
    font-weight:bold;
    font-size:20px;
}

#riskBox{
    margin-top:20px;
    border:1px solid #00ffcc;
    padding:10px;
}

/* GRAPH */
.graph{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:20px;
}

.node{
    border:1px solid #00ffcc;
    padding:10px;
    width:140px;
    cursor:pointer;
}

.healthy{ color:#00ff00; }
.degraded{ color:#ffcc00; }
.failed{ color:#ff0000; }

.score{
    font-size:26px;
    font-weight:bold;
}
</style>

</head>

<body>

<h1>SEXTANT CONTROL ROOM</h1>

<h2>
System Status:
<span id="status">HEALTHY</span>
</h2>

<div class="graph">
    <div id="core" class="node healthy" onclick="fail('core')">CORE BANKING</div>
    <div id="payment" class="node healthy" onclick="fail('payment')">PAYMENT</div>
    <div id="mobile" class="node healthy" onclick="fail('mobile')">MOBILE</div>
</div>

<button onclick="resetSystem()">Reset</button>
<button onclick="runScenario()">Run Scenario</button>

<div id="output">Awaiting simulation...</div>

<h3>Incident Log</h3>
<div id="log">System initialized.</div>

<h3>Risk Engine</h3>
<div id="riskBox">
Risk Score: <span id="score" class="score">0</span> / 100
<br>
Risk Level: <span id="level">LOW</span>
</div>

<script>

/* ---------------------------
   STATE
----------------------------*/

let state = {
    core: "healthy",
    payment: "healthy",
    mobile: "healthy"
};

/* ---------------------------
   LOG
----------------------------*/

function log(msg){
    const box = document.getElementById("log");
    const time = new Date().toLocaleTimeString();
    box.innerHTML += `<br>[${time}] ${msg}`;
    box.scrollTop = box.scrollHeight;
}

/* ---------------------------
   NODE UPDATE
----------------------------*/

function setNode(id, status){
    state[id] = status;
    document.getElementById(id).className = "node " + status;
}

/* ---------------------------
   RESET
----------------------------*/

function resetSystem(){

    state = {
        core:"healthy",
        payment:"healthy",
        mobile:"healthy"
    };

    setNode("core","healthy");
    setNode("payment","healthy");
    setNode("mobile","healthy");

    document.getElementById("status").innerText = "HEALTHY";
    document.getElementById("status").style.color = "#00ff00";

    document.getElementById("log").innerHTML = "System initialized.";

    updateRisk();

    log("SYSTEM RESET");
}

/* ---------------------------
   FAILURE + PROPAGATION
----------------------------*/

function fail(node){

    log(node.toUpperCase() + " FAILURE INJECTED");

    setNode(node,"failed");

    if(node==="core"){
        setTimeout(()=>setNode("payment","degraded"),500);
        setTimeout(()=>setNode("mobile","degraded"),1000);
    }

    if(node==="payment"){
        setTimeout(()=>setNode("mobile","degraded"),500);
    }

    updateRisk();
    evaluate();
}

/* ---------------------------
   SCENARIO
----------------------------*/

function runScenario(){

    resetSystem();

    log("SCENARIO: CASCADE TEST");

    setTimeout(()=>fail("core"),500);
}

/* ---------------------------
   RISK ENGINE (CORE)
----------------------------*/

function calculateRisk(){

    let score = 0;

    if(state.core === "failed") score += 50;
    if(state.payment === "failed") score += 30;
    if(state.mobile === "failed") score += 20;

    if(state.core === "degraded") score += 25;
    if(state.payment === "degraded") score += 15;
    if(state.mobile === "degraded") score += 10;

    if(score > 100) score = 100;

    return score;
}

function getLevel(score){

    if(score < 30) return "LOW";
    if(score < 60) return "MEDIUM";
    if(score < 85) return "HIGH";
    return "CRITICAL";
}

function updateRisk(){

    const score = calculateRisk();
    const level = getLevel(score);

    document.getElementById("score").innerText = score;
    document.getElementById("level").innerText = level;

    if(level==="LOW") document.getElementById("level").style.color="#00ff00";
    if(level==="MEDIUM") document.getElementById("level").style.color="#ffcc00";
    if(level==="HIGH") document.getElementById("level").style.color="#ff8800";
    if(level==="CRITICAL") document.getElementById("level").style.color="#ff0000";

    document.getElementById("score").style.color =
        (score < 30) ? "#00ff00" :
        (score < 60) ? "#ffcc00" :
        (score < 85) ? "#ff8800" : "#ff0000";
}

/* ---------------------------
   SYSTEM STATE
----------------------------*/

function evaluate(){

    if(state.core === "failed"){
        document.getElementById("status").innerText = "CRITICAL";
        document.getElementById("status").style.color = "#ff0000";
        return;
    }

    if(state.payment === "failed" || state.mobile === "failed"){
        document.getElementById("status").innerText = "DEGRADED";
        document.getElementById("status").style.color = "#ffcc00";
        return;
    }

    document.getElementById("status").innerText = "HEALTHY";
    document.getElementById("status").style.color = "#00ff00";
}

/* INIT */
resetSystem();

</script>

</body>
</html>
