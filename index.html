<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sextant Master Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0b0f14;
    color: #2bd4ff;
    text-align: center;
}

h1 { margin-top: 20px; }

button {
    width: 90%;
    max-width: 400px;
    padding: 15px;
    margin: 10px;
    background: #111826;
    color: #2bd4ff;
    border: 1px solid #2bd4ff;
    font-size: 16px;
    cursor: pointer;
}

button:active { transform: scale(0.98); }

.note {
    font-size: 12px;
    color: #7aa2b7;
    margin-top: 10px;
}
</style>
</head>

<body>

<h1>SEXTANT MASTER CONSOLE</h1>

<button onclick="go('sim')">Run Simulation Screen v2</button>
<button onclick="go('ind')">Industrial Control Screen v1</button>
<button onclick="go('pilot')">Schneider Datacentre Pilot</button>

<div class="note">Stable Navigation Layer • Direct Routing Mode</div>

<script>

/* =========================
   BASE URL
========================= */
const BASE = "https://123agustien.github.io/sextant-resilience-operations-console/";

/* =========================
   SIMPLE RELIABLE ROUTER
========================= */
function go(screen) {

    const routes = {
        sim: "simulation_screen_v2.html",
        ind: "industrial_control_screen_v1.html",
        pilot: "schneider_datacentre_pilot.html"
    };

    const url = BASE + routes[screen];

    // DIRECT NAVIGATION (NO FETCH = NO BREAKS)
    window.location.href = url;
}

</script>

</body>
</html>
