<!DOCTYPE html>
<html>
<head>
<title>Sextant Control Room v4</title>

<style>
body{
    font-family:Arial;
    background:#0b0f19;
    color:#00ffcc;
    text-align:center;
}

button{
    padding:10px;
    margin:5px;
    background:black;
    color:#00ffcc;
    border:1px solid #00ffcc;
    cursor:pointer;
}

#output{
    margin-top:20px;
    padding:10px;
    border:1px solid #00ffcc;
}

#impactBox{
    margin-top:20px;
    border:1px solid #00ffcc;
    padding:10px;
}

#log{
    margin-top:20px;
    border:1px solid #00ffcc;
    height:200px;
    overflow-y:auto;
    padding:10px;
    text-align:left;
}

#status{
    font-weight:bold;
    font-size:20px;
}

/* GRAPH */
.graph{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:20px;
    align-items:center;
}

.node{
    border:1px solid #00ffcc;
    padding:10px;
    width:140px;
}

.line{
    width:40px;
    height:2px;
    background:#00ffcc;
}

.healthy{ color:#00ff00; }
.degraded{ color:#ffcc00; }
.failed{ color:#ff0000; }
</style>

</head>

<body>

<h1>SEXTANT CONTROL ROOM</h1>

<h2>
System Status:
<span id="status">HEALTHY</span>
</h2>

<!-- GRAPH VISUAL -->
<div class="graph">
    <div id="core" class="node healthy">CORE BANKING</div>
    <div class="line"></div>
    <div id="payment" class="node healthy">PAYMENT</div>
    <div class="line"></div>
    <div id="mobile" class="node healthy">MOBILE</div>
</div>

<button onclick="runSim('normal')">Normal Operation</button>
<button onclick="runSim('failure')">Core Banking Failure</button>
<button onclick="runSim('cascade')">Cascade Failure</button>

<div id="output">Awaiting simulation...</div>

<div id="impactBox">
<h3>Impact Analysis</h3>
<p>Impact: <span id="impact">-</span></p>
<p>Services: <span id="services">-</span></p>
</div>

<h3>Incident Timeline</h3>
<div id="log">System initialized.</div>

<script>

function now(){
    return new Date().toLocaleTimeString();
}

function log(msg){
    const box = document.getElementById("log");
    box.innerHTML += "<br>[" + now() + "] " + msg;
    box.scrollTop = box.scrollHeight;
}

function setNode(id, state){
    document.getElementById(id).className = "node " + state;
}

function setStatus(state){
    const el = document.getElementById("status");

    el.innerText = state;

    if(state==="HEALTHY") el.style.color="#00ff00";
    if(state==="DEGRADED") el.style.color="#ffcc00";
    if(state==="CRITICAL") el.style.color="#ff0000";
}

function updateImpact(i,s){
    document.getElementById("impact").innerText = i;
    document.getElementById("services").innerText = s;
}

function reset(){
    setNode("core","healthy");
    setNode("payment","healthy");
    setNode("mobile","healthy");
}

function runSim(type){

    document.getElementById("log").innerHTML = "System initialized.";
    reset();

    log("SIMULATION START: " + type.toUpperCase());

    if(type==="normal"){

        setStatus("HEALTHY");
        updateImpact("LOW","All services operational");

        log("NO FAILURE DETECTED");
        return;
    }

    if(type==="failure"){

        setNode("core","failed");
        setNode("payment","degraded");
        setNode("mobile","degraded");

        setStatus("CRITICAL");

        updateImpact("HIGH","Payment + Mobile impacted");

        log("CORE BANKING FAILED");
        log("PAYMENT DEGRADED");
        log("MOBILE DEGRADED");

        return;
    }

    if(type==="cascade"){

        setNode("core","failed");

        setTimeout(()=>{
            setNode("payment","failed");
            log("PAYMENT FAILURE PROPAGATED");
        },600);

        setTimeout(()=>{
            setNode("mobile","degraded");
            log("MOBILE DEGRADED DUE TO CASCADE");
        },1200);

        setStatus("CRITICAL");

        updateImpact("VERY HIGH","Core + Payment cascade failure");

        log("CORE BANKING FAILED");
        log("CASCADE PROPAGATION INITIATED");

        return;
    }
}

</script>

</body>
</html>
