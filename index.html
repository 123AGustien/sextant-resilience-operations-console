<!DOCTYPE html>
<html>
<head>
<title>Sextant Control Room v4.2</title>

<style>
body{
    font-family:Arial;
    background:#0b0f19;
    color:#00ffcc;
    text-align:center;
}

button{
    padding:10px;
    margin:5px;
    background:black;
    color:#00ffcc;
    border:1px solid #00ffcc;
    cursor:pointer;
}

#output{
    margin-top:20px;
    padding:10px;
    border:1px solid #00ffcc;
}

#impactBox{
    margin-top:20px;
    border:1px solid #00ffcc;
    padding:10px;
}

#log{
    margin-top:20px;
    border:1px solid #00ffcc;
    height:220px;
    overflow-y:auto;
    padding:10px;
    text-align:left;
}

#status{
    font-weight:bold;
    font-size:20px;
}

/* GRAPH */
.graph{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:20px;
    align-items:center;
}

.node{
    border:1px solid #00ffcc;
    padding:10px;
    width:140px;
    cursor:pointer;
    user-select:none;
}

.node:hover{
    opacity:0.8;
}

.line{
    width:40px;
    height:2px;
    background:#00ffcc;
}

.healthy{ color:#00ff00; }
.degraded{ color:#ffcc00; }
.failed{ color:#ff0000; }
</style>

</head>

<body>

<h1>SEXTANT CONTROL ROOM</h1>

<h2>
System Status:
<span id="status">HEALTHY</span>
</h2>

<!-- CLICKABLE GRAPH -->
<div class="graph">
    <div id="core" class="node healthy" onclick="failNode('core')">
        CORE BANKING
    </div>

    <div class="line"></div>

    <div id="payment" class="node healthy" onclick="failNode('payment')">
        PAYMENT
    </div>

    <div class="line"></div>

    <div id="mobile" class="node healthy" onclick="failNode('mobile')">
        MOBILE
    </div>
</div>

<button onclick="runSim('normal')">Reset System</button>
<button onclick="runSim('cascade')">Auto Cascade Test</button>

<div id="output">Awaiting simulation...</div>

<div id="impactBox">
<h3>Impact Analysis</h3>
<p>Impact: <span id="impact">-</span></p>
<p>Services: <span id="services">-</span></p>
</div>

<h3>Incident Timeline</h3>
<div id="log">System initialized.</div>

<script>

function now(){
    return new Date().toLocaleTimeString();
}

function log(msg){
    const box = document.getElementById("log");
    box.innerHTML += "<br>[" + now() + "] " + msg;
    box.scrollTop = box.scrollHeight;
}

function setNode(id, state){
    document.getElementById(id).className = "node " + state;
}

function setStatus(state){
    const el = document.getElementById("status");

    el.innerText = state;

    if(state==="HEALTHY") el.style.color="#00ff00";
    if(state==="DEGRADED") el.style.color="#ffcc00";
    if(state==="CRITICAL") el.style.color="#ff0000";
}

function updateImpact(i,s){
    document.getElementById("impact").innerText = i;
    document.getElementById("services").innerText = s;
}

function reset(){
    setNode("core","healthy");
    setNode("payment","healthy");
    setNode("mobile","healthy");

    setStatus("HEALTHY");

    updateImpact("-","-");

    document.getElementById("log").innerHTML = "System initialized.";
}

function failNode(node){

    log(node.toUpperCase() + " MANUAL FAILURE INJECTED");

    setNode(node,"failed");

    propagate();

    evaluate();
}

function propagate(){

    if(document.getElementById("core").className.includes("failed")){
        setTimeout(()=>{
            setNode("payment","degraded");
            log("PAYMENT DEGRADED DUE TO CORE FAILURE");
        },400);

        setTimeout(()=>{
            setNode("mobile","degraded");
            log("MOBILE DEGRADED DUE TO DOWNSTREAM IMPACT");
        },800);
    }

    if(document.getElementById("payment").className.includes("failed")){
        setTimeout(()=>{
            setNode("mobile","degraded");
            log("MOBILE DEGRADED DUE TO PAYMENT FAILURE");
        },400);
    }
}

function evaluate(){

    let core = document.getElementById("core").className;
    let payment = document.getElementById("payment").className;
    let mobile = document.getElementById("mobile").className;

    if(core.includes("failed")){
        setStatus("CRITICAL");
        updateImpact("VERY HIGH","Core + downstream impacted");
        return;
    }

    if(payment.includes("failed")){
        setStatus("CRITICAL");
        updateImpact("HIGH","Payment + mobile impacted");
        return;
    }

    if(mobile.includes("failed")){
        setStatus("DEGRADED");
        updateImpact("MEDIUM","Mobile only impacted");
        return;
    }

    setStatus("HEALTHY");
    updateImpact("LOW","All services operational");
}

function runSim(type){

    if(type==="normal"){
        reset();
        return;
    }

    if(type==="cascade"){

        reset();

        log("AUTO CASCADE TEST START");

        setTimeout(()=>setNode("core","failed"),300);

        setTimeout(()=>propagate(),600);

        setTimeout(()=>evaluate(),1200);

        return;
    }
}

</script>

</body>
</html>
