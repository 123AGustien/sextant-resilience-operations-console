<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sextant Command Center v10</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    font-family: Arial;
    background: #0b0f19;
    color: #e6f7ff;
    text-align: center;
}

button {
    margin: 6px;
    padding: 10px;
    background: black;
    color: #2bd4ff;
    border: 1px solid #2bd4ff;
    cursor: pointer;
}

.panel {
    border: 1px solid #2bd4ff;
    max-width: 900px;
    margin: 15px auto;
    padding: 15px;
    background: #111827;
}

.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    max-width: 900px;
    margin: 20px auto;
}

.node {
    border: 1px solid #2bd4ff;
    padding: 12px;
    background: #111827;
}

.ok { color: lime; }
.warn { color: orange; }
.bad { color: red; }
.crit { color: magenta; }

pre {
    text-align: left;
    background: #000;
    padding: 10px;
    font-size: 12px;
    overflow: auto;
}
</style>
</head>

<body>

<h2>🧭 SEXTANT COMMAND CENTER v10</h2>
<h3>Status: <span id="status">BOOTING</span></h3>

<div class="panel">
    <h3>Scenario Input</h3>
    <input id="input" style="width:80%;padding:10px;" placeholder="normal / failure / cascade">
    <button onclick="runManual()">RUN</button>
</div>

<button onclick="run('normal')">Normal</button>
<button onclick="run('failure')">Failure</button>
<button onclick="run('cascade')">Cascade</button>

<div class="grid">
    <div class="node" id="fx">FX</div>
    <div class="node" id="bank">BANK</div>
    <div class="node" id="liq">LIQ</div>
    <div class="node" id="eq">EQ</div>
    <div class="node" id="conf">CONF</div>
    <div class="node" id="state">STATE</div>
</div>

<div class="panel">
    <h3>Live Frame</h3>
    <pre id="frame">waiting...</pre>
</div>

<div class="panel">
    <h3>Audit Output</h3>
    <pre id="audit">waiting...</pre>
</div>

<script>

/* =========================
   SAFE ENGINE FALLBACK
========================= */
window.runRP04 = window.runRP04 || function(type) {
    return {
        scenario: type,
        rp04: { stability: 0.7, pressure: 0.4 },
        system: { fx: 0.4, bank: 0.5, liq: 0.6, eq: 0.5, conf: 0.7 }
    };
};

/* =========================
   SAFE ORCHESTRA
========================= */
window.orchestra = window.orchestra || {
    run: (t) => window.runRP04(t)
};

/* =========================
   AUDIT BRIDGE
========================= */
window.SextantBridge = window.SextantBridge || {
    captureSimulationResult: function(frame) {
        return {
            scenario: frame.scenario,
            risk: frame.system.fx * 100,
            impact: frame.rp04.pressure * 100,
            stability: frame.rp04.stability * 100
        };
    }
};

/* =========================
   RUN CORE
========================= */
function run(type) {

    const frame = window.orchestra.run(type);
    const audit = window.SextantBridge.captureSimulationResult(frame);

    window.__FRAME__ = frame;

    document.getElementById("status").innerText = type.toUpperCase();

    document.getElementById("frame").innerText =
        JSON.stringify(frame, null, 2);

    document.getElementById("audit").innerText =
        JSON.stringify(audit, null, 2);

    updateNodes(frame.system);

    window.dispatchEvent(new CustomEvent("sextant:run", {
        detail: { frame, audit }
    }));
}

/* =========================
   UPDATE UI NODES
========================= */
function updateNodes(s) {

    set("fx", s.fx);
    set("bank", s.bank);
    set("liq", s.liq);
    set("eq", s.eq);
    set("conf", s.conf);

    document.getElementById("state").innerText =
        "OK";
}

function set(id, v) {

    const el = document.getElementById(id);

    let cls =
        v > 0.75 ? "ok" :
        v > 0.5 ? "warn" :
        v > 0.3 ? "bad" : "crit";

    el.className = "node " + cls;
    el.innerText = id.toUpperCase() + ": " + Number(v).toFixed(2);
}

/* =========================
   MANUAL INPUT
========================= */
function runManual() {
    const v = document.getElementById("input").value;
    run(v);
}

</script>

</body>
</html>
