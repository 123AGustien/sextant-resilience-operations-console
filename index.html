<!DOCTYPE html>
<html>
<head>
<title>Sextant Control Room v4 FINAL</title>

<style>
body{
    font-family:Arial;
    background:#0b0f19;
    color:#00ffcc;
    text-align:center;
}

button{
    padding:10px;
    margin:5px;
    background:black;
    color:#00ffcc;
    border:1px solid #00ffcc;
    cursor:pointer;
}

#output{
    margin-top:20px;
    padding:10px;
    border:1px solid #00ffcc;
}

#impactBox{
    margin-top:20px;
    border:1px solid #00ffcc;
    padding:10px;
}

#log{
    margin-top:20px;
    border:1px solid #00ffcc;
    height:220px;
    overflow-y:auto;
    padding:10px;
    text-align:left;
}

#status{
    font-weight:bold;
    font-size:20px;
}

/* GRAPH */
.graph{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:20px;
    align-items:center;
}

.node{
    border:1px solid #00ffcc;
    padding:10px;
    width:140px;
    cursor:pointer;
    user-select:none;
    transition: all 0.4s ease;
}

.node:hover{
    opacity:0.85;
    transform:scale(1.05);
}

.line{
    width:40px;
    height:2px;
    background:#00ffcc;
}

/* STATES */
.healthy{ color:#00ff00; }
.degraded{ color:#ffcc00; }
.failed{ color:#ff0000; }

/* ANIMATION */
.shock{
    animation:pulse 0.5s ease-in-out 2;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.1);}
    100%{transform:scale(1);}
}
</style>

</head>

<body>

<h1>SEXTANT CONTROL ROOM</h1>

<h2>
System Status:
<span id="status">HEALTHY</span>
</h2>

<!-- DEPENDENCY GRAPH -->
<div class="graph">
    <div id="core" class="node healthy" onclick="failNode('core')">
        CORE BANKING
    </div>

    <div class="line"></div>

    <div id="payment" class="node healthy" onclick="failNode('payment')">
        PAYMENT
    </div>

    <div class="line"></div>

    <div id="mobile" class="node healthy" onclick="failNode('mobile')">
        MOBILE
    </div>
</div>

<button onclick="resetSystem()">Reset System</button>
<button onclick="autoCascade()">Run Cascade Simulation</button>

<div id="output">Awaiting simulation...</div>

<div id="impactBox">
<h3>Impact Analysis</h3>
<p>Impact: <span id="impact">-</span></p>
<p>Services: <span id="services">-</span></p>
</div>

<h3>Incident Timeline</h3>
<div id="log">System initialized.</div>

<script>

function now(){
    return new Date().toLocaleTimeString();
}

function log(msg){
    const box = document.getElementById("log");
    box.innerHTML += "<br>[" + now() + "] " + msg;
    box.scrollTop = box.scrollHeight;
}

function setNode(id,state){
    const el = document.getElementById(id);
    el.className = "node " + state;

    el.classList.add("shock");
    setTimeout(()=>el.classList.remove("shock"),500);
}

function setStatus(state){
    const el = document.getElementById("status");

    el.innerText = state;

    if(state==="HEALTHY") el.style.color="#00ff00";
    if(state==="DEGRADED") el.style.color="#ffcc00";
    if(state==="CRITICAL") el.style.color="#ff0000";
}

function updateImpact(i,s){
    document.getElementById("impact").innerText = i;
    document.getElementById("services").innerText = s;
}

function resetSystem(){

    setNode("core","healthy");
    setNode("payment","healthy");
    setNode("mobile","healthy");

    setStatus("HEALTHY");

    updateImpact("-","-");

    document.getElementById("log").innerHTML = "System initialized.";

    log("SYSTEM RESET COMPLETE");
}

function failNode(node){

    log(node.toUpperCase() + " MANUAL FAILURE");

    setNode(node,"failed");

    if(node==="core") cascadeFromCore();
    if(node==="payment") cascadeFromPayment();
    if(node==="mobile") mobileOnlyImpact();
}

function cascadeFromCore(){

    setStatus("CRITICAL");
    updateImpact("VERY HIGH","Core + downstream systems");

    setTimeout(()=>{
        setNode("payment","degraded");
        log("PAYMENT DEGRADED (dependency on CORE)");
    },500);

    setTimeout(()=>{
        setNode("mobile","degraded");
        log("MOBILE DEGRADED (cascade from PAYMENT)");
    },1100);
}

function cascadeFromPayment(){

    setStatus("CRITICAL");
    updateImpact("HIGH","Payment + mobile impacted");

    setTimeout(()=>{
        setNode("mobile","degraded");
        log("MOBILE DEGRADED (dependency on PAYMENT)");
    },600);
}

function mobileOnlyImpact(){

    setStatus("DEGRADED");
    updateImpact("MEDIUM","Single service impact");
}

function autoCascade(){

    resetSystem();

    log("AUTO CASCADE SIMULATION START");

    setTimeout(()=>{
        failNode("core");
    },500);
}

</script>

</body>
</html>
