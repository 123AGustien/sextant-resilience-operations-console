<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sextant Master Console</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0b0f14;
    color: #2bd4ff;
    text-align: center;
}

h1 {
    margin-top: 20px;
    font-size: 22px;
    letter-spacing: 1px;
}

button {
    width: 90%;
    max-width: 400px;
    padding: 15px;
    margin: 10px;
    background: #111826;
    color: #2bd4ff;
    border: 1px solid #2bd4ff;
    font-size: 16px;
    cursor: pointer;
    border-radius: 6px;
}

button:active {
    transform: scale(0.98);
}

button:hover {
    opacity: 0.85;
}

.note {
    font-size: 12px;
    color: #7aa2b7;
    margin-top: 15px;
}

.status {
    margin-top: 15px;
    font-size: 13px;
    color: #7aa2b7;
}
</style>
</head>

<body>

<h1>SEXTANT MASTER CONSOLE</h1>

<button onclick="go('sim')">Run Simulation Screen v2</button>
<button onclick="go('ind')">Industrial Control Screen v1</button>
<button onclick="go('pilot')">Schneider Datacentre Pilot</button>

<div class="status" id="statusBox">
Navigation Layer: ACTIVE
</div>

<div class="note">
Stable Navigation Layer • Direct Routing Mode
</div>

<script>

/* =========================
   BASE URL (OPS CONSOLE ROOT)
========================= */
const BASE = "https://123agustien.github.io/sextant-resilience-operations-console/";

/* =========================
   ROUTES MAP
========================= */
const routes = {
    sim: "simulation_screen_v2.html",
    ind: "industrial_control_screen_v1.html",
    pilot: "schneider_datacentre_pilot.html"
};

/* =========================
   SAFE ROUTER ENGINE
========================= */
function go(screen) {

    const file = routes[screen];

    const statusBox = document.getElementById("statusBox");

    if (!file) {
        statusBox.innerText = "Navigation Error: Route not defined";
        return;
    }

    const url = BASE + file;

    statusBox.innerText = "Checking route: " + file;

    // validate existence before redirect
    fetch(url, { method: "HEAD" })
        .then(res => {

            if (res.ok) {
                statusBox.innerText = "Opening: " + file;
                window.location.href = url;
            } else {
                statusBox.innerText = "ERROR: Screen not found → " + file;
                alert("Screen not found: " + file);
            }

        })
        .catch(() => {
            statusBox.innerText = "Network error or missing file";
            alert("Network error or file missing");
        });
}

</script>

</body>
</html>
