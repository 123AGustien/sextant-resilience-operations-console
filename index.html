<!DOCTYPE html>
<html>
<head>
<title>Sextant Control Room</title>

<style>
body{
    font-family:Arial;
    background:#0b0f19;
    color:#00ffcc;
    text-align:center;
}

button{
    padding:10px;
    margin:5px;
    background:black;
    color:#00ffcc;
    border:1px solid #00ffcc;
    cursor:pointer;
}

#output{
    margin-top:20px;
    padding:10px;
    border:1px solid #00ffcc;
}

#impactBox{
    margin-top:20px;
    border:1px solid #00ffcc;
    padding:10px;
}

#log{
    margin-top:20px;
    border:1px solid #00ffcc;
    height:180px;
    overflow-y:auto;
    padding:10px;
    text-align:left;
}

#status{
    font-weight:bold;
    font-size:20px;
}
</style>
</head>

<body>

<h1>SEXTANT CONTROL ROOM</h1>

<h2>
System Status:
<span id="status">HEALTHY</span>
</h2>

<button onclick="runSim('normal')">Normal Operation</button>
<button onclick="runSim('failure')">Core Banking Failure</button>
<button onclick="runSim('cascade')">Cascade Failure</button>

<div id="output">
Awaiting simulation...
</div>

<div id="impactBox">
<h3>Impact Analysis</h3>
<p>Impact Level: <span id="impact">-</span></p>
<p>Affected Services: <span id="services">-</span></p>
</div>

<h3>Event Log</h3>

<div id="log">
System initialized.
</div>

<script>

function log(msg){

    const logBox =
        document.getElementById("log");

    const time =
        new Date().toLocaleTimeString();

    logBox.innerHTML +=
        "<br>[" + time + "] " + msg;

    logBox.scrollTop =
        logBox.scrollHeight;
}

function runSim(type){

    const status =
        document.getElementById("status");

    const output =
        document.getElementById("output");

    let impact = "-";
    let services = "-";

    if(type==="normal"){

        status.innerText="HEALTHY";
        status.style.color="#00ff00";

        impact = "LOW";
        services = "All services operational";

        output.innerHTML =
            "<h3>Simulation Result</h3>" +
            "<p>State: HEALTHY</p>" +
            "<p>Impact: LOW</p>";

        document.getElementById("impact").innerText = impact;
        document.getElementById("services").innerText = services;

        log("NORMAL OPERATION");
        return;
    }

    if(type==="failure"){

        status.innerText="CRITICAL";
        status.style.color="#ff0000";

        impact = "HIGH";
        services = "Payment + Mobile banking impacted";

        output.innerHTML =
            "<h3>Simulation Result</h3>" +
            "<p>CORE BANKING FAILED</p>" +
            "<p>PAYMENT GATEWAY DEGRADED</p>" +
            "<p>MOBILE BANKING DEGRADED</p>" +
            "<p>Impact: HIGH</p>";

        document.getElementById("impact").innerText = impact;
        document.getElementById("services").innerText = services;

        log("CORE_BANKING FAILED");
        log("PAYMENT_GATEWAY DEGRADED");
        log("MOBILE_BANKING DEGRADED");

        return;
    }

    if(type==="cascade"){

        status.innerText="CRITICAL";
        status.style.color="#ff0000";

        impact = "VERY HIGH";
        services = "Core + Payment systems impacted";

        output.innerHTML =
            "<h3>Simulation Result</h3>" +
            "<p>CORE BANKING FAILED</p>" +
            "<p>PAYMENT GATEWAY FAILED</p>" +
            "<p>MOBILE BANKING DEGRADED</p>" +
            "<p>Impact: VERY HIGH</p>";

        document.getElementById("impact").innerText = impact;
        document.getElementById("services").innerText = services;

        log("CASCADE FAILURE STARTED");
        log("CORE_BANKING FAILED");
        log("PAYMENT_GATEWAY FAILED");
        log("MOBILE_BANKING DEGRADED");

        return;
    }
}

</script>

</body>
</html>
