<!DOCTYPE html>
<html>
<head>
    <title>Sextant Control Room</title>
    <style>
        body {
            font-family: Arial;
            background: #0b0f19;
            color: #00ffcc;
            text-align: center;
        }

        button {
            padding: 10px;
            margin: 5px;
            background: black;
            color: #00ffcc;
            border: 1px solid #00ffcc;
        }

        #output {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #00ffcc;
        }
    </style>
</head>

<body>

<h1>SEXTANT CONTROL ROOM</h1>

<button onclick="runSim('normal')">Normal Operation</button>
<button onclick="runSim('failure')">Node Failure</button>
<button onclick="runSim('cascade')">Cascade Failure</button>

<div id="output">
    Awaiting simulation...
</div>

<script>
function runSim(type) {

    let result = {};

    if (type === "normal") {
        result = {
            state: "HEALTHY",
            impact: "LOW",
            agents: ["noop_agent"]
        };
    }

    if (type === "failure") {
        result = {
            state: "DEGRADED",
            impact: "MEDIUM",
            agents: ["sre_agent", "recovery_agent"]
        };
    }

    if (type === "cascade") {
        result = {
            state: "CRITICAL",
            impact: "HIGH",
            agents: ["sre_agent", "dependency_agent", "recovery_agent"]
        };
    }

    document.getElementById("output").innerHTML =
        "<h3>Simulation Result</h3>" +
        "<p>State: " + result.state + "</p>" +
        "<p>Impact: " + result.impact + "</p>" +
        "<p>Agents: " + result.agents.join(", ") + "</p>";
}
</script>

</body>
</html>
