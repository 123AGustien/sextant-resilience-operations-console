<!DOCTYPE html>
<html>
<head>
<title>Sextant Control Room v7 FINAL AUDIT ENGINE</title>

<style>
body{
    font-family:Arial;
    background:#0b0f19;
    color:#00ffcc;
    text-align:center;
}

button{
    padding:10px;
    margin:5px;
    background:black;
    color:#00ffcc;
    border:1px solid #00ffcc;
    cursor:pointer;
}

#status{
    font-weight:bold;
    font-size:20px;
}

#log{
    margin-top:20px;
    border:1px solid #00ffcc;
    height:180px;
    overflow-y:auto;
    padding:10px;
    text-align:left;
}

#riskBox, #reportBox{
    margin-top:20px;
    border:1px solid #00ffcc;
    padding:10px;
    text-align:left;
}

.graph{
    margin-top:20px;
    display:flex;
    justify-content:center;
    gap:20px;
}

.node{
    border:1px solid #00ffcc;
    padding:10px;
    width:140px;
    cursor:pointer;
}

.healthy{ color:#00ff00; }
.degraded{ color:#ffcc00; }
.failed{ color:#ff0000; }

.score{
    font-size:26px;
    font-weight:bold;
}
</style>

</head>

<body>

<h1>SEXTANT CONTROL ROOM</h1>

<h2>
System Status:
<span id="status">HEALTHY</span>
</h2>

<div class="graph">
    <div id="core" class="node healthy" onclick="fail('core')">CORE BANKING</div>
    <div id="payment" class="node healthy" onclick="fail('payment')">PAYMENT</div>
    <div id="mobile" class="node healthy" onclick="fail('mobile')">MOBILE</div>
</div>

<button onclick="resetSystem()">Reset</button>
<button onclick="runScenario()">Run Scenario</button>
<button onclick="generateReport()">Generate Audit Report</button>

<div id="log">System initialized.</div>

<h3>Risk Engine</h3>
<div id="riskBox">
Risk Score: <span id="score" class="score">0</span>/100
<br>
Risk Level: <span id="level">LOW</span>
</div>

<h3>Audit Report (Regulator View)</h3>
<pre id="reportBox">No report generated.</pre>

<script>

/* ---------------------------
   STATE
----------------------------*/

let state = {
    core:"healthy",
    payment:"healthy",
    mobile:"healthy"
};

/* ---------------------------
   LOGGING
----------------------------*/

function log(msg){
    const box = document.getElementById("log");
    const time = new Date().toLocaleTimeString();
    box.innerHTML += `<br>[${time}] ${msg}`;
    box.scrollTop = box.scrollHeight;
}

/* ---------------------------
   SYSTEM CONTROL
----------------------------*/

function setNode(id,status){
    state[id] = status;
    document.getElementById(id).className = "node " + status;
}

/* ---------------------------
   RESET
----------------------------*/

function resetSystem(){

    state = {
        core:"healthy",
        payment:"healthy",
        mobile:"healthy"
    };

    setNode("core","healthy");
    setNode("payment","healthy");
    setNode("mobile","healthy");

    document.getElementById("status").innerText = "HEALTHY";
    document.getElementById("status").style.color = "#00ff00";

    document.getElementById("log").innerHTML = "System initialized.";
    document.getElementById("reportBox").innerText = "No report generated.";

    updateRisk();

    log("SYSTEM RESET");
}

/* ---------------------------
   FAILURE + PROPAGATION
----------------------------*/

function fail(node){

    log(node.toUpperCase() + " FAILURE INJECTED");

    setNode(node,"failed");

    if(node==="core"){
        setTimeout(()=>setNode("payment","degraded"),500);
        setTimeout(()=>setNode("mobile","degraded"),1000);
    }

    if(node==="payment"){
        setTimeout(()=>setNode("mobile","degraded"),500);
    }

    updateRisk();
    evaluate();
}

/* ---------------------------
   SCENARIO
----------------------------*/

function runScenario(){
    resetSystem();
    log("SCENARIO START");
    setTimeout(()=>fail("core"),500);
}

/* ---------------------------
   RISK ENGINE
----------------------------*/

function calculateRisk(){

    let score = 0;

    if(state.core==="failed") score+=50;
    if(state.payment==="failed") score+=30;
    if(state.mobile==="failed") score+=20;

    if(state.core==="degraded") score+=25;
    if(state.payment==="degraded") score+=15;
    if(state.mobile==="degraded") score+=10;

    return Math.min(score,100);
}

function getLevel(score){

    if(score<30) return "LOW";
    if(score<60) return "MEDIUM";
    if(score<85) return "HIGH";
    return "CRITICAL";
}

function updateRisk(){

    const score = calculateRisk();
    const level = getLevel(score);

    document.getElementById("score").innerText = score;
    document.getElementById("level").innerText = level;

    document.getElementById("level").style.color =
        level==="LOW"?"#00ff00":
        level==="MEDIUM"?"#ffcc00":
        level==="HIGH"?"#ff8800":"#ff0000";

    document.getElementById("score").style.color =
        score<30?"#00ff00":
        score<60?"#ffcc00":
        score<85?"#ff8800":"#ff0000";
}

/* ---------------------------
   SYSTEM STATE
----------------------------*/

function evaluate(){

    let status = "HEALTHY";

    if(state.core==="failed") status="CRITICAL";
    else if(state.payment==="failed"||state.mobile==="failed") status="DEGRADED";

    document.getElementById("status").innerText = status;

    document.getElementById("status").style.color =
        status==="HEALTHY"?"#00ff00":
        status==="DEGRADED"?"#ffcc00":"#ff0000";
}

/* ---------------------------
   AUDIT REPORT ENGINE
----------------------------*/

function generateReport(){

    const score = calculateRisk();
    const level = getLevel(score);

    const report = {
        reportId: "AUDIT-" + Math.floor(Math.random()*99999),
        timestamp: new Date().toISOString(),

        systemState: document.getElementById("status").innerText,

        riskScore: score,
        riskLevel: level,

        nodeState: {
            core: state.core,
            payment: state.payment,
            mobile: state.mobile
        },

        interpretation:
            level==="LOW"
            ? "System stable with minimal disruption."
            : level==="MEDIUM"
            ? "Partial degradation observed in dependent services."
            : level==="HIGH"
            ? "Significant service degradation across multiple layers."
            : "Critical system failure with cascading impact across infrastructure."
    };

    document.getElementById("reportBox").innerText =
        JSON.stringify(report, null, 2);

    log("AUDIT REPORT GENERATED");
}

/* INIT */
resetSystem();

</script>

</body>
</html>
