<!DOCTYPE html>
<html>
<head>
<title>Sextant Control Room — Institutional View</title>

<style>
body{
    font-family: Arial;
    background:#0b0f19;
    color:#e6f7ff;
    margin:0;
    padding:30px;
    text-align:center;
}

/* HEADER */
h1{
    margin-bottom:5px;
    letter-spacing:1px;
}

.sub{
    font-size:13px;
    opacity:0.7;
    margin-bottom:25px;
}

/* MAIN STATUS CARD */
#statusCard{
    max-width:420px;
    margin:20px auto;
    padding:20px;
    border:1px solid #2bd4ff;
    border-radius:6px;
    font-size:22px;
    font-weight:bold;
}

/* BUTTON */
button{
    padding:16px;
    width:85%;
    max-width:320px;
    margin:15px auto;
    display:block;
    background:#000;
    color:#2bd4ff;
    border:1px solid #2bd4ff;
    font-size:15px;
    cursor:pointer;
    border-radius:4px;
}

/* OUTPUT PANEL */
#panel{
    max-width:420px;
    margin:20px auto;
    padding:15px;
    border:1px solid #2bd4ff;
    text-align:left;
    font-size:14px;
    min-height:80px;
}

/* LOG */
#log{
    max-width:420px;
    margin:20px auto;
    padding:10px;
    border:1px solid #2bd4ff;
    height:140px;
    overflow-y:auto;
    text-align:left;
    font-size:12px;
}

/* COLORS */
.green{ color:#00ff99; }
.yellow{ color:#ffcc00; }
.red{ color:#ff4d4d; }

.small{
    font-size:12px;
    opacity:0.7;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>SEXTANT CONTROL ROOM</h1>
<div class="sub">Operational Resilience & Audit Simulation Engine</div>

<div id="statusCard" class="green">
SYSTEM STATUS: HEALTHY
</div>

<button onclick="runDemo()">▶ RUN INSTITUTIONAL DEMO</button>

<div id="panel">
Waiting for simulation...
</div>

<div class="small">Event Timeline</div>
<div id="log">System initialized.</div>

<script>

/* LOG */
function log(msg){
    const box = document.getElementById("log");
    const time = new Date().toLocaleTimeString();
    box.innerHTML += `<br>[${time}] ${msg}`;
    box.scrollTop = box.scrollHeight;
}

/* STATUS */
function setStatus(text, level){
    const box = document.getElementById("statusCard");

    box.innerText = "SYSTEM STATUS: " + text;

    box.className =
        level === "green" ? "green" :
        level === "yellow" ? "yellow" : "red";
}

/* DEMO FLOW */
function runDemo(){

    document.getElementById("panel").innerHTML =
        "Initializing simulation...";

    log("DEMO START");

    setTimeout(() => {

        setStatus("HEALTHY","green");
        log("STEP 1: System stable");

    }, 800);

    setTimeout(() => {

        setStatus("DEGRADED","yellow");
        log("STEP 2: Core banking failure injected");

    }, 2000);

    setTimeout(() => {

        setStatus("CRITICAL","red");
        log("STEP 3: Cascade failure propagated");

        document.getElementById("panel").innerHTML =
            "Risk Score: 88 / 100<br>Risk Level: CRITICAL";

    }, 3500);

    setTimeout(() => {

        document.getElementById("panel").innerHTML +=
            "<br><br>Audit Report: GENERATED ✔";

        log("STEP 4: Audit report generated");

    }, 5000);
}

</script>

</body>
</html>
