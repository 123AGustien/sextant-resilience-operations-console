<!DOCTYPE html>
<html>
<head>
    <title>Sextant Control Room</title>

    <style>
        body {
            font-family: Arial;
            background: #0b0f19;
            color: #00ffcc;
            text-align: center;
        }

        button {
            padding: 10px;
            margin: 5px;
            background: black;
            color: #00ffcc;
            border: 1px solid #00ffcc;
            cursor: pointer;
        }

        #output {
            margin-top: 20px;
            padding: 10px;
            border: 1px solid #00ffcc;
        }

        #log {
            margin-top: 20px;
            border: 1px solid #00ffcc;
            height: 150px;
            overflow-y: auto;
            padding: 10px;
            text-align: left;
        }

        #status {
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>SEXTANT CONTROL ROOM</h1>

<h2>System Status: <span id="status">UNKNOWN</span></h2>

<button onclick="runSim('normal')">Normal Operation</button>
<button onclick="runSim('failure')">Node Failure</button>
<button onclick="runSim('cascade')">Cascade Failure</button>

<div id="output">Awaiting simulation...</div>

<h3>Event Log</h3>
<div id="log">No events recorded.</div>

<script>

const system = {
    db: { status: "healthy", dependsOn: [] },
    auth: { status: "healthy", dependsOn: ["db"] },
    gateway: { status: "healthy", dependsOn: ["auth"] }
};

function log(msg) {
    const logBox = document.getElementById("log");
    const time = new Date().toLocaleTimeString();
    logBox.innerHTML += `[${time}] ${msg}<br>`;
    logBox.scrollTop = logBox.scrollHeight;
}

function resetSystem() {
    for (let node in system) {
        system[node].status = "healthy";
    }
}

function injectFailure(node) {
    system[node].status = "failed";
    log(node.toUpperCase() + " FAILED");
}

function propagate() {

    let changed = true;

    while (changed) {
        changed = false;

        for (let node in system) {
            for (let dep of system[node].dependsOn) {

                if (system[dep].status === "failed" &&
                    system[node].status !== "failed") {

                    system[node].status = "degraded";
                    log(node.toUpperCase() + " DEGRADED");
                    changed = true;
                }
            }
        }
    }
}

function computeState() {

    const states = Object.values(system).map(n => n.status);

    if (states.includes("failed")) return "CRITICAL";
    if (states.includes("degraded")) return "DEGRADED";
    return "HEALTHY";
}

function render() {

    const container = document.getElementById("output");

    const state = computeState();
    const statusEl = document.getElementById("status");

    statusEl.innerText = state;

    if (state === "HEALTHY") statusEl.style.color = "#00ff00";
    if (state === "DEGRADED") statusEl.style.color = "#ffcc00";
    if (state === "CRITICAL") statusEl.style.color = "#ff0000";

    container.innerHTML =
        "<h3>Simulation Complete</h3>" +
        "<p>System State: " + state + "</p>";
}

function runSim(type) {

    resetSystem();
    log("Simulation: " + type.toUpperCase());

    if (type === "failure") {
        injectFailure("db");
    }

    if (type === "cascade") {
        injectFailure("db");
    }

    setTimeout(() => {
        propagate();
        render();
        log("Simulation complete");
    }, 800);
}

render();

</script>

</body>
</html>
