<script>

/* =========================
   CORE STATE
========================= */

let demoStep = 0;

/* =========================
   LOG
========================= */

function log(msg){
    const box = document.getElementById("log");
    const time = new Date().toLocaleTimeString();
    box.innerHTML += `<br>[${time}] ${msg}`;
    box.scrollTop = box.scrollHeight;
}

/* =========================
   SYSTEM RESET
========================= */

function resetSystem(){

    demoStep = 0;

    document.getElementById("status").innerText = "HEALTHY";
    document.getElementById("status").style.color = "#00ff00";

    document.getElementById("log").innerHTML = "System initialized.";

    document.getElementById("riskBox")?.remove?.();

    log("SYSTEM RESET");
}

/* =========================
   DEMO FLOW ENGINE
========================= */

function runDemo(){

    resetSystem();

    log("DEMO STARTED: Institutional Resilience Simulation");

    setTimeout(step1, 1000);
}

/* =========================
   STEP 1
========================= */

function step1(){

    log("STEP 1: Initial system state is HEALTHY");
    document.getElementById("status").innerText = "HEALTHY";

    setTimeout(step2, 1500);
}

/* =========================
   STEP 2
========================= */

function step2(){

    log("STEP 2: Injecting CORE BANKING failure");
    document.getElementById("status").innerText = "DEGRADED";
    document.getElementById("status").style.color = "#ffcc00";

    setTimeout(step3, 1500);
}

/* =========================
   STEP 3
========================= */

function step3(){

    log("STEP 3: Cascade propagation to PAYMENT + MOBILE");

    document.getElementById("status").innerText = "CRITICAL";
    document.getElementById("status").style.color = "#ff0000";

    setTimeout(step4, 1500);
}

/* =========================
   STEP 4
========================= */

function step4(){

    log("STEP 4: Risk Engine calculating impact");

    const score = 85;
    const level = "CRITICAL";

    log("Risk Score: " + score);
    log("Risk Level: " + level);

    setTimeout(step5, 1500);
}

/* =========================
   STEP 5
========================= */

function step5(){

    log("STEP 5: Generating Audit Report");

    const report = {
        reportId: "DEMO-" + Math.floor(Math.random()*99999),
        timestamp: new Date().toISOString(),
        systemState: "CRITICAL",
        riskScore: 85,
        riskLevel: "CRITICAL",
        interpretation: "System-wide cascading failure detected across core banking infrastructure."
    };

    const box = document.createElement("pre");
    box.id = "riskBox";
    box.style.border = "1px solid #00ffcc";
    box.style.padding = "10px";
    box.style.marginTop = "20px";

    box.innerText = JSON.stringify(report, null, 2);

    document.body.appendChild(box);

    log("AUDIT REPORT GENERATED");

    setTimeout(step6, 2000);
}

/* =========================
   STEP 6
========================= */

function step6(){

    log("DEMO COMPLETE — SYSTEM READY FOR REGULATORY REVIEW");

}

/* =========================
   OPTIONAL QUICK SCENARIO
========================= */

function runScenario(){
    log("Manual scenario mode triggered");
}

</script>
