<!-- GRAPH CONTAINER -->
<div class="panel">
    <h3>Risk Graph</h3>
    <div id="riskGraph"></div>
</div>

<!-- ENGINE -->
<script src="../core/control_engine.js"></script>
<script src="../assets/risk_graph.js"></script>

<script>

let autoLoop = null;

function run(type) {

    const status = document.getElementById("status");
    const output = document.getElementById("output");

    if (typeof runSimulation !== "function") {
        output.innerHTML = "❌ ENGINE NOT LOADED";
        return;
    }

    let scenario = { type };

    if (type === "failure") scenario = { stress: 0.7 };
    if (type === "cascade") scenario = { stress: 0.9 };

    const result = runSimulation(scenario);

    // status safe read
    const state = result?.state || result?.final_state || "UNKNOWN";
    status.innerText = state;
    status.className = "status " + state.toLowerCase();

    // output
    output.innerHTML = "<pre>" + JSON.stringify(result, null, 2) + "</pre>";

    // GRAPH (SAFE CALL)
    if (window.RiskGraph && typeof RiskGraph.push === "function") {
        RiskGraph.push(result);
    } else {
        console.log("RiskGraph not ready");
    }
}

function startAuto() {
    if (autoLoop) return;

    autoLoop = setInterval(() => {
        run("cascade");
    }, 3000);
}

function stopAuto() {
    clearInterval(autoLoop);
    autoLoop = null;
}

</script>
