<!DOCTYPE html>
<html>
<head>
    <title>Sextant Control Room</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #0b0f14;
            color: #d7f3ff;
            margin: 0;
            padding: 10px;
        }

        .panel {
            border: 1px solid #2bd4ff;
            padding: 15px;
            margin: 10px auto;
            border-radius: 8px;
            background: #111826;
            max-width: 900px;
        }

        .status {
            font-size: 26px;
            font-weight: bold;
        }

        .green { color: lime; }
        .amber { color: orange; }
        .red { color: red; }
        .critical { color: magenta; }

        button {
            margin: 5px;
            padding: 10px 14px;
            cursor: pointer;
        }

        pre {
            font-size: 12px;
            text-align: left;
            white-space: pre-wrap;
        }

        /* IMPORTANT: graph container */
        #riskGraph {
            max-width: 900px;
            margin: 10px auto;
        }
    </style>
</head>

<body>

<h2>SEXTANT CONTROL ROOM</h2>

<div class="panel">
    Status:
    <span id="status" class="status green">GREEN</span>
</div>

<div class="panel">
    <button onclick="run('normal')">Normal</button>
    <button onclick="run('failure')">Failure</button>
    <button onclick="run('cascade')">Cascade</button>
</div>

<div class="panel">
    <button onclick="startAuto()">AUTO ON</button>
    <button onclick="stopAuto()">AUTO OFF</button>
</div>

<div class="panel">
    <h3>Simulation Output</h3>
    <div id="output">Waiting...</div>
</div>

<!-- ✅ GRAPH GOES HERE -->
<div id="riskGraph"></div>

<script src="../core/control_engine.js"></script>
<script src="../assets/risk_graph.js"></script>

<script>

let autoLoop = null;

function run(type) {

    const status = document.getElementById("status");
    const output = document.getElementById("output");

    let scenario = { type };

    if (type === "failure") scenario = { stress: 0.7 };
    if (type === "cascade") scenario = { stress: 0.9 };

    const result = runSimulation(scenario);

    const state = result?.state || result?.final_state || "UNKNOWN";

    status.innerText = state;
    status.className = "status " + state.toLowerCase();

    output.innerHTML = "<pre>" + JSON.stringify(result, null, 2) + "</pre>";

    // ✅ THIS IS THE CRITICAL LINE
    if (window.RiskGraph) {
        RiskGraph.push(result);
    }
}

function startAuto() {
    if (autoLoop) return;

    autoLoop = setInterval(() => run("cascade"), 3000);
}

function stopAuto() {
    clearInterval(autoLoop);
    autoLoop = null;
}

</script>

</body>
</html>
