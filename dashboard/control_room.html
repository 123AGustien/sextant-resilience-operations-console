<!DOCTYPE html>
<html>
<head>
    <title>Sextant Control Room v7–v9</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: #0b0f14;
            color: #d7f3ff;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 900px;
            margin: auto;
            margin-top: 20px;
        }

        .panel {
            border: 1px solid #2bd4ff;
            padding: 15px;
            border-radius: 8px;
            background: #111826;
        }

        .status {
            font-size: 24px;
            font-weight: bold;
        }

        .green { color: lime; }
        .amber { color: orange; }
        .red { color: red; }
        .critical { color: magenta; }

        pre {
            text-align: left;
            font-size: 12px;
            white-space: pre-wrap;
        }

        button {
            margin: 5px;
            padding: 8px 12px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- HEADER (PHASE 7–9 METADATA ONLY) -->
<!--
SEXTANT CONTROL ROOM
v7 manual control
v8 state persistence
v9 auto simulation loop
-->

<h2>SEXTANT CONTROL ROOM</h2>

<div class="grid">

    <!-- STATUS -->
    <div class="panel">
        <h3>Status</h3>
        <div id="status" class="status green">GREEN</div>
    </div>

    <!-- CONTROLS -->
    <div class="panel">
        <h3>Controls</h3>

        <button onclick="run('normal')">Normal</button>
        <button onclick="run('failure')">Failure</button>
        <button onclick="run('cascade')">Cascade</button>

        <hr>

        <button onclick="startAuto()">AUTO ON</button>
        <button onclick="stopAuto()">AUTO OFF</button>
    </div>

    <!-- OUTPUT -->
    <div class="panel" style="grid-column: span 2;">
        <h3>Simulation Output</h3>
        <div id="output">Waiting...</div>
    </div>

</div>

<!-- ENGINE -->
<script src="../models/fx_model.js"></script>
<script src="../models/contagion_model.js"></script>
<script src="../core_engine/simulation_engine.js"></script>

<script>

let autoLoop = null;

/* =========================
   PHASE 8: STATE PERSISTENCE
========================= */
function saveState(data) {
    localStorage.setItem("SEXTANT_STATE", JSON.stringify(data));
}

function loadState() {
    return JSON.parse(localStorage.getItem("SEXTANT_STATE") || "null");
}

/* =========================
   CORE SIMULATION RUNNER
========================= */
function run(type) {

    const status = document.getElementById("status");
    const output = document.getElementById("output");

    if (typeof runSimulation !== "function") {
        output.innerHTML = "❌ ENGINE NOT LOADED";
        return;
    }

    let scenario = { type };

    if (type === "failure") scenario = { stress: 0.7 };
    if (type === "cascade") scenario = { stress: 0.9 };

    const result = runSimulation(scenario);

    saveState(result);

    const state = result?.final_state || "UNKNOWN";

    status.innerText = state;
    status.className = "status " + state.toLowerCase();

    output.innerHTML = "<pre>" + JSON.stringify(result, null, 2) + "</pre>";
}

/* =========================
   PHASE 9: AUTO LOOP
========================= */
function startAuto() {
    if (autoLoop) return;

    autoLoop = setInterval(() => {
        run("cascade");
    }, 3000);
}

function stopAuto() {
    clearInterval(autoLoop);
    autoLoop = null;
}

/* =========================
   RESTORE ON LOAD
========================= */
window.onload = function () {

    const saved = loadState();

    if (saved) {
        document.getElementById("output").innerHTML =
            "<pre>" + JSON.stringify(saved, null, 2) + "</pre>";

        document.getElementById("status").innerText =
            saved.final_state || "UNKNOWN";
    }
};

</script>

</body>
</html>
