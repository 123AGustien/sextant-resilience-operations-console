<!-- GRAPH -->
<div class="panel">
    <h3>Risk Graph</h3>
    <div id="riskGraph"></div>
</div>

<script src="../assets/risk_graph.js"></script>

<script>
let autoLoop = null;

function run(type) {

    const status = document.getElementById("status");
    const output = document.getElementById("output");

    if (!window.runSimulation) {
        output.innerHTML = "❌ ENGINE NOT LOADED";
        return;
    }

    const result = runSimulation({
        type,
        stress: type === "cascade" ? 0.9 : type === "failure" ? 0.7 : 0
    });

    status.innerText = result?.state || "UNKNOWN";
    status.className = "status " + (result?.state || "unknown").toLowerCase();

    output.innerHTML = "<pre>" + JSON.stringify(result, null, 2) + "</pre>";

    // GRAPH FEED
    if (window.RiskGraph) {
        window.RiskGraph.push(result);
    }
}

function startAuto() {
    if (autoLoop) return;
    autoLoop = setInterval(() => run("cascade"), 3000);
}

function stopAuto() {
    clearInterval(autoLoop);
    autoLoop = null;
}
</script>
