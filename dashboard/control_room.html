<!DOCTYPE html>
<html>
<head>
    <title>Sextant Control Room v8</title>

    <style>
        body {
            font-family: Arial;
            background: #05070d;
            color: #d7f7ff;
            text-align: center;
        }

        #status {
            font-size: 22px;
            margin: 10px;
        }

        .GREEN { color: #2bd4ff; }
        .AMBER { color: orange; }
        .RED { color: red; }

        pre {
            text-align: left;
            max-width: 900px;
            margin: auto;
            background: #0b0f14;
            padding: 10px;
            border: 1px solid #2bd4ff;
        }

        button {
            margin: 5px;
            padding: 10px;
        }
    </style>
</head>

<body>

<h2>Control Room</h2>

<div id="status">READY</div>

<pre id="output">Waiting...</pre>

<div id="riskGraph"></div>

<script src="../core_engine/simulation_engine.js"></script>
<script src="../assets/risk_graph.js"></script>

<script>
function run(type) {

    if (!window.runSimulation) {
        document.getElementById("output").innerText = "ENGINE NOT LOADED";
        return;
    }

    const result = runSimulation({
        name: type,
        stress: type === "cascade" ? 0.9 : type === "failure" ? 0.6 : 0
    });

    document.getElementById("output").innerText =
        JSON.stringify(result, null, 2);

    const state = result.final_state || "GREEN";

    const status = document.getElementById("status");
    status.innerText = state;
    status.className = state;

    window.RiskGraph?.push(result);
}
</script>

<button onclick="run('cascade')">Cascade</button>
<button onclick="run('failure')">Failure</button>

</body>
</html>
