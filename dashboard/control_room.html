<!--
========================================================
SEXTANT CONTROL ROOM
Institutional Simulation Layer v7 → v8 → v9 (FINAL UI BUILD)

FEATURES:
- Deterministic simulation engine
- Scenario execution (Normal / Failure / Cascade)
- Auto-loop simulation
- Risk graph integration hook
- GitHub Pages compatible (static only)
========================================================
-->

<!DOCTYPE html>
<html>
<head>
    <title>Sextant Control Room</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: #0b0f14;
            color: #d7f3ff;
            margin: 0;
            padding: 10px;
        }

        .panel {
            border: 1px solid #2bd4ff;
            padding: 15px;
            margin: 10px auto;
            border-radius: 8px;
            background: #111826;
            max-width: 900px;
        }

        .status {
            font-size: 26px;
            font-weight: bold;
        }

        .green { color: lime; }
        .amber { color: orange; }
        .red { color: red; }
        .critical { color: magenta; }

        button {
            margin: 5px;
            padding: 10px 14px;
            cursor: pointer;
        }

        pre {
            font-size: 12px;
            text-align: left;
            white-space: pre-wrap;
        }

        canvas {
            width: 100%;
            max-width: 900px;
        }
    </style>
</head>

<body>

<h2>SEXTANT CONTROL ROOM</h2>

<!-- STATUS -->
<div class="panel">
    <div>Status:
        <span id="status" class="status green">GREEN</span>
    </div>
</div>

<!-- CONTROLS -->
<div class="panel">
    <button onclick="run('normal')">Normal</button>
    <button onclick="run('failure')">Failure</button>
    <button onclick="run('cascade')">Cascade</button>
</div>

<!-- AUTO -->
<div class="panel">
    <button onclick="startAuto()">AUTO ON</button>
    <button onclick="stopAuto()">AUTO OFF</button>
</div>

<!-- OUTPUT -->
<div class="panel">
    <h3>Simulation Output</h3>
    <div id="output">Waiting...</div>
</div>

<!-- RISK GRAPH -->
<div class="panel">
    <h3>Risk Graph</h3>
    <canvas id="riskGraph"></canvas>
</div>

<!-- ENGINE -->
<script src="../core/control_engine.js"></script>

<!-- GRAPH ENGINE -->
<script src="../assets/risk_graph.js"></script>

<script>

let autoLoop = null;

/* =========================
   CORE SIMULATION RUNNER
========================= */
function run(type) {

    const status = document.getElementById("status");
    const output = document.getElementById("output");

    if (typeof runSimulation !== "function") {
        output.innerHTML = "❌ ENGINE NOT LOADED";
        return;
    }

    let scenario = { type };

    if (type === "failure") scenario = { stress: 0.7 };
    if (type === "cascade") scenario = { stress: 0.9 };

    const result = runSimulation(scenario);

    // STATUS
    const state = result?.final_state || "UNKNOWN";
    status.innerText = state;
    status.className = "status " + state.toLowerCase();

    // OUTPUT
    output.innerHTML = "<pre>" + JSON.stringify(result, null, 2) + "</pre>";

    // GRAPH HOOK (SAFE)
    if (window.updateRiskGraph) {
        window.updateRiskGraph(result);
    }
}

/* =========================
   AUTO LOOP
========================= */
function startAuto() {

    if (autoLoop) return;

    autoLoop = setInterval(() => {
        run("cascade");
    }, 3000);
}

function stopAuto() {
    clearInterval(autoLoop);
    autoLoop = null;
}

</script>

</body>
</html>
