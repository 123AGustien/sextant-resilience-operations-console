<!DOCTYPE html>
<html>
<head>
    <title>Sextant Control Room v8</title>

    <style>
        body {
            font-family: Arial;
            background: #05070d;
            color: #d7f7ff;
            text-align: center;
        }

        #status {
            font-size: 22px;
            margin: 10px;
        }

        .GREEN { color: #2bd4ff; }
        .AMBER { color: orange; }
        .RED { color: red; }

        .panel {
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h2>Control Room</h2>

<div id="status">READY</div>

<!-- MODEL OUTPUT (IMPORTANT SCREEN LAYER) -->
<pre id="output">Waiting...</pre>

<!-- GRAPH VIEW -->
<div class="panel">
    <h3>Risk Graph</h3>
    <div id="riskGraph"></div>
</div>

<!-- ENGINE -->
<script src="../core_engine/simulation_engine.js"></script>
<script src="../assets/risk_graph.js"></script>

<script>

function run(type) {

    const status = document.getElementById("status");
    const output = document.getElementById("output");

    if (!window.runSimulation) {
        output.innerText = "ENGINE NOT LOADED";
        return;
    }

    const result = runSimulation({
        type: type,
        stress:
            type === "cascade" ? 0.9 :
            type === "failure" ? 0.6 : 0
    });

    // SCREEN MODEL VIEW (THIS IS WHAT YOU LOST BEFORE GRAPH)
    output.innerText = JSON.stringify(result, null, 2);

    status.innerText = result.state;
    status.className = result.state;

    // GRAPH FEED
    window.RiskGraph?.push(result);
}

function testGraph() {
    window.RiskGraph?.push({ impact: Math.random() * 100 });
}

</script>

<!-- CONTROLS -->
<button onclick="run('cascade')">Cascade</button>
<button onclick="run('failure')">Failure</button>
<button onclick="testGraph()">Test Graph</button>

</body>
</html>
