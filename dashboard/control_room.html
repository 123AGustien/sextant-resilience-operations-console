<!DOCTYPE html>
<html>
<head>
    <title>Sextant Control Room v8.1 Stable</title>

    <style>
        body {
            font-family: Arial;
            background: #05070d;
            color: #d7f7ff;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h2 {
            margin-bottom: 10px;
        }

        #status {
            font-size: 22px;
            margin: 10px;
        }

        .GREEN { color: #2bd4ff; }
        .AMBER { color: orange; }
        .RED { color: red; }
        .CRITICAL { color: red; font-weight: bold; }

        /* SCREEN MODEL LAYER */
        #output {
            text-align: left;
            max-width: 900px;
            margin: auto;
            background: #0b0f14;
            padding: 12px;
            border: 1px solid #2bd4ff;
            min-height: 140px;
            white-space: pre-wrap;
        }

        /* GRAPH PANEL */
        .panel {
            margin-top: 20px;
        }

        button {
            margin: 5px;
            padding: 10px 14px;
            background: #0b0f14;
            color: #d7f7ff;
            border: 1px solid #2bd4ff;
            cursor: pointer;
        }

        button:hover {
            background: #111826;
        }
    </style>
</head>

<body>

<h2>Control Room</h2>

<div id="status">READY</div>

<!-- SCREEN MODEL (CRITICAL LAYER) -->
<pre id="output">Waiting for simulation...</pre>

<!-- GRAPH VIEW -->
<div class="panel">
    <h3>Risk Graph</h3>
    <div id="riskGraph"></div>
</div>

<!-- ENGINE -->
<script src="../core_engine/simulation_engine.js"></script>
<script src="../assets/risk_graph.js"></script>

<script>
let autoLoop = null;

/* =========================
   GRAPH BOOT (v8.1 SAFE)
========================= */
function bootGraph() {
    if (window.RiskGraph) {
        window.RiskGraph.push({ impact: 0 });
        return;
    }
    setTimeout(bootGraph, 200);
}

window.addEventListener("load", bootGraph);

/* =========================
   RUN SIMULATION
========================= */
function run(type) {

    const status = document.getElementById("status");
    const output = document.getElementById("output");

    if (!window.runSimulation) {
        output.innerText = "ENGINE NOT LOADED";
        return;
    }

    const result = runSimulation({
        name: type,
        stress:
            type === "cascade" ? 0.9 :
            type === "failure" ? 0.6 : 0
    });

    // SCREEN MODEL FEED
    output.innerText = JSON.stringify(result, null, 2);

    // STATUS UPDATE
    const state = result.final_state || "GREEN";
    status.innerText = state;
    status.className = state;

    // GRAPH FEED
    window.RiskGraph?.push(result);
}

/* =========================
   AUTO TEST MODE
========================= */
function startAuto() {
    if (autoLoop) return;

    autoLoop = setInterval(() => {
        run("cascade");
    }, 4000);
}

function stopAuto() {
    clearInterval(autoLoop);
    autoLoop = null;
}
</script>

<!-- CONTROLS -->
<button onclick="run('cascade')">Cascade</button>
<button onclick="run('failure')">Failure</button>
<button onclick="startAuto()">Auto Start</button>
<button onclick="stopAuto()">Stop</button>

</body>
</html>
