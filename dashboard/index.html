<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Sextant Resilience Control Room v2</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0b1220;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .card {
            background: #1e293b;
            padding: 12px;
            border-radius: 12px;
        }

        .stable {
            color: #4ade80;
            font-weight: bold;
        }

        .degraded {
            color: #f87171;
            font-weight: bold;
        }

        pre {
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
            overflow: auto;
            font-size: 12px;
            max-height: 300px;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .section {
            margin-top: 15px;
        }

        button:hover {
            background: #2563eb;
        }
    </style>
</head>

<body>

<h1>🧭 Sextant Resilience Control Room v2</h1>

<div class="grid">

    <div class="card">
        <h3>System State</h3>
        <div id="state" class="stable">STABLE</div>
    </div>

    <div class="card">
        <h3>Risk Score</h3>
        <div id="risk">0.0</div>
    </div>

    <div class="card">
        <h3>Action</h3>
        <div id="action">NO_ACTION</div>
    </div>

</div>

<div class="grid section">

    <div class="card">
        <h3>Validation</h3>
        <pre id="validation">-</pre>
    </div>

    <div class="card">
        <h3>Evidence Logs</h3>
        <pre id="evidence">Loading...</pre>
    </div>

    <div class="card">
        <h3>System Trace</h3>
        <pre id="trace">Waiting...</pre>
    </div>

</div>

<button onclick="runSimulation()">🎯 Run Simulation</button>

<script>

const API = "http://127.0.0.1:8000";

/* ---------------------------
   FETCH EVIDENCE
--------------------------- */
async function fetchEvidence() {
    try {
        const res = await fetch(`${API}/evidence`);
        const data = await res.json();

        const records = data.records || [];

        document.getElementById("evidence").innerText =
            JSON.stringify(records.slice(-10), null, 2);

    } catch (e) {
        document.getElementById("evidence").innerText =
            "Evidence feed offline";
    }
}

/* ---------------------------
   MAIN DASHBOARD UPDATE
--------------------------- */
async function updateDashboard(riskValue = 0.5) {

    try {
        const response = await fetch(`${API}/evaluate`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                risk: riskValue,
                signal: "CONTROL_ROOM"
            })
        });

        if (!response.ok) throw new Error("API unreachable");

        const data = await response.json();

        const result = data.resilience_result || {};

        const state = result.state || "UNKNOWN";
        const risk = result.risk_score ?? 0;
        const action = result.action || "NO_ACTION";

        // update UI
        document.getElementById("state").innerText = state;
        document.getElementById("risk").innerText = risk;
        document.getElementById("action").innerText = action;

        document.getElementById("validation").innerText =
            JSON.stringify(data.validation || {}, null, 2);

        document.getElementById("trace").innerText =
            JSON.stringify(data, null, 2);

        // state color
        const stateEl = document.getElementById("state");
        stateEl.className = (state === "DEGRADED") ? "degraded" : "stable";

    } catch (err) {

        document.getElementById("state").innerText = "OFFLINE";
        document.getElementById("state").className = "degraded";

        document.getElementById("trace").innerText =
            "System error: " + err.message;
    }
}

/* ---------------------------
   SIMULATION
--------------------------- */
function runSimulation() {
    const risk = Math.random();
    updateDashboard(risk);
}

/* ---------------------------
   AUTO REFRESH LOOPS
--------------------------- */
setInterval(() => updateDashboard(0.4), 3000);
setInterval(fetchEvidence, 4000);

/* ---------------------------
   INITIAL LOAD
--------------------------- */
updateDashboard(0.4);
fetchEvidence();

</script>

</body>
</html>
