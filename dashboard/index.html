<!DOCTYPE html>
<html>
<head>
    <title>Sextant Resilience Control Room v2</title>

    <style>
        body {
            font-family: Arial;
            background: #0b1220;
            color: white;
            margin: 0;
            padding: 20px;
        }

        h1 {
            margin-bottom: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .card {
            background: #1e293b;
            padding: 12px;
            border-radius: 12px;
        }

        .stable { color: #4ade80; font-weight: bold; }
        .degraded { color: #f87171; font-weight: bold; }

        pre {
            background: #0f172a;
            padding: 10px;
            border-radius: 8px;
            overflow: auto;
            font-size: 12px;
            max-height: 300px;
        }

        button {
            margin-top: 10px;
            padding: 10px;
            background: #3b82f6;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .section {
            margin-top: 15px;
        }
    </style>
</head>

<body>

<h1>🧭 Sextant Resilience Control Room v2</h1>

<div class="grid">

    <div class="card">
        <h3>System State</h3>
        <div id="state" class="stable">STABLE</div>
    </div>

    <div class="card">
        <h3>Risk Score</h3>
        <div id="risk">0.0</div>
    </div>

    <div class="card">
        <h3>Action</h3>
        <div id="action">NO_ACTION</div>
    </div>

</div>

<div class="grid section">

    <div class="card">
        <h3>Validation</h3>
        <div id="validation">-</div>
    </div>

    <div class="card">
        <h3>Evidence Logs</h3>
        <pre id="evidence">Loading...</pre>
    </div>

    <div class="card">
        <h3>System Trace</h3>
        <pre id="trace">Waiting...</pre>
    </div>

</div>

<button onclick="runSimulation()">🎯 Run Simulation</button>

<script>

async function fetchEvidence() {
    try {
        const res = await fetch("http://127.0.0.1:8000/evidence");
        const data = await res.json();

        document.getElementById("evidence").innerText =
            JSON.stringify(data.records.slice(-10), null, 2);

    } catch (e) {
        console.log("Evidence error", e);
    }
}

async function updateDashboard(riskValue = 0.5) {

    try {
        const response = await fetch("http://127.0.0.1:8000/evaluate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                risk: riskValue,
                signal: "CONTROL_ROOM"
            })
        });

        const data = await response.json();

        const result = data.resilience_result;

        // main fields
        document.getElementById("state").innerText = result.state;
        document.getElementById("risk").innerText = result.risk_score;
        document.getElementById("action").innerText = result.action;

        // validation
        document.getElementById("validation").innerText =
            JSON.stringify(data.validation, null, 2);

        // full trace
        document.getElementById("trace").innerText =
            JSON.stringify(data, null, 2);

        // color logic
        const stateEl = document.getElementById("state");
        stateEl.className = result.state === "DEGRADED" ? "degraded" : "stable";

    } catch (err) {
        console.log("API error", err);
    }
}

// simulation mode
function runSimulation() {
    const risk = Math.random(); // 0 → 1
    updateDashboard(risk);
}

// auto refresh loops
setInterval(() => updateDashboard(0.4), 3000);
setInterval(fetchEvidence, 4000);

// initial load
updateDashboard(0.4);
fetchEvidence();

</script>

</body>
</html>
