<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sextant Simulation Screen v2</title>

<style>
body {
    background:#05070d;
    color:#2bd4ff;
    font-family:Arial;
    text-align:center;
}

#status {
    font-size:22px;
    margin:10px;
}

.node {
    display:inline-block;
    padding:10px;
    margin:5px;
    min-width:120px;
    border:1px solid #2bd4ff;
}

.green { color:lime; border-color:lime; }
.amber { color:orange; border-color:orange; }
.red { color:red; border-color:red; }
.critical { color:magenta; border-color:magenta; }

button {
    margin:5px;
    padding:10px;
    background:black;
    color:#2bd4ff;
    border:1px solid #2bd4ff;
    cursor:pointer;
}

pre {
    text-align:left;
    max-width:900px;
    margin:auto;
    background:#0b0f14;
    padding:10px;
    border:1px solid #2bd4ff;
}

canvas {
    background:#0a0f14;
    margin-top:10px;
    border:1px solid #2bd4ff;
}
</style>
</head>

<body>

<h2>SEXTANT SIMULATION SCREEN v2</h2>

<div id="status">BOOTING</div>

<button onclick="run('normal')">Normal</button>
<button onclick="run('failure')">Failure</button>
<button onclick="run('cascade')">Cascade</button>
<button onclick="resetSim()">Reset</button>

<h3>System Nodes</h3>

<div class="node" id="rp04">RP-04</div>
<div class="node" id="fx">FX</div>
<div class="node" id="bank">BANK</div>
<div class="node" id="liq">LIQ</div>
<div class="node" id="eq">EQ</div>
<div class="node" id="conf">CONF</div>

<h3>Output</h3>
<pre id="output">Waiting...</pre>

<h3>🧭 Risk Dashboard</h3>

<div id="riskLevel" style="font-size:20px; margin:10px;">
Risk: --
</div>

<h4>Metrics</h4>
<pre id="metrics">--</pre>

<h4>Insights</h4>
<pre id="insights">--</pre>

<h4>Recommendations</h4>
<pre id="recommendations">--</pre>

<h3>FX Risk Graph</h3>
<canvas id="graph" width="800" height="200"></canvas>

<!-- ========================= -->
<!-- ENGINE -->
<!-- ========================= -->
<script>
function runRP04(type) {

    const rp04 = {
        stability: type === "cascade" ? 0.25 : type === "failure" ? 0.55 : 0.82,
        pressure: type === "cascade" ? 0.95 : type === "failure" ? 0.6 : 0.28
    };

    const fx = rp04.pressure;

    const bank = fx * 0.83;
    const liq  = bank * 0.88;
    const eq   = liq * 0.91;
    const conf = eq * 0.94;

    const state = rp04.stability > 0.6 ? "STABLE" : "RISK";

    return {
        rp04,
        system: { fx, bank, liq, eq, conf },
        state
    };
}
</script>

<!-- ========================= -->
<!-- SIMULATION LOGIC -->
<!-- ========================= -->
<script>

window.logs = [];

function setNode(id, v) {

    const el = document.getElementById(id);

    let cls =
        v < 0.3 ? "green" :
        v < 0.6 ? "amber" :
        v < 0.85 ? "red" : "critical";

    el.className = "node " + cls;
    el.innerText = id.toUpperCase() + ": " + v.toFixed(2);
}

function run(type) {

    const result = window.runRP04(type);

    window.logs.push(result);

    document.getElementById("status").innerText = result.state;

    document.getElementById("output").innerText =
        JSON.stringify(result, null, 2);

    setNode("rp04", result.rp04.stability);
    setNode("fx", result.system.fx);
    setNode("bank", result.system.bank);
    setNode("liq", result.system.liq);
    setNode("eq", result.system.eq);
    setNode("conf", result.system.conf);

    drawGraph();

    updateDashboard(result);
}

function drawGraph() {

    const canvas = document.getElementById("graph");
    const ctx = canvas.getContext("2d");

    ctx.clearRect(0,0,800,200);

    ctx.beginPath();
    ctx.strokeStyle = "#2bd4ff";

    window.logs.forEach((l,i) => {

        const x = i * 40;
        const y = 180 - (l.system.fx * 150);

        if (i === 0) ctx.moveTo(x,y);
        else ctx.lineTo(x,y);
    });

    ctx.stroke();
}

function resetSim() {

    window.logs = [];

    document.getElementById("output").innerText = "RESET";
    document.getElementById("status").innerText = "RESET";

    document.getElementById("riskLevel").innerText = "Risk: --";
    document.getElementById("metrics").innerText = "--";
    document.getElementById("insights").innerText = "--";
    document.getElementById("recommendations").innerText = "--";

    drawGraph();
}

/* =========================
   🧭 DASHBOARD ENGINE
========================= */

function updateDashboard(result) {

    const conf = result.system.conf;

    let risk =
        conf > 0.8 ? "🟢 STABLE" :
        conf > 0.6 ? "🟡 CONTROLLED STRESS" :
        conf > 0.4 ? "🟠 ELEVATED RISK" :
                     "🔴 SYSTEMIC INSTABILITY";

    document.getElementById("riskLevel").innerText = "Risk: " + risk;

    document.getElementById("metrics").innerText =
        `FX: ${result.system.fx.toFixed(2)}\n` +
        `BANK: ${result.system.bank.toFixed(2)}\n` +
        `LIQ: ${result.system.liq.toFixed(2)}\n` +
        `EQ: ${result.system.eq.toFixed(2)}\n` +
        `CONF: ${result.system.conf.toFixed(2)}`;

    let insights = [];

    if (result.system.liq < 0.5) {
        insights.push("Liquidity stress propagating through system layers.");
    }

    if (result.system.bank < 0.5) {
        insights.push("Bank subsystem showing instability signals.");
    }

    if (result.system.fx > 0.8) {
        insights.push("FX volatility contributing to cascade amplification.");
    }

    document.getElementById("insights").innerText =
        insights.length ? insights.join("\n") : "No critical insights detected.";

    let recs = [];

    if (result.system.liq < 0.5) {
        recs.push("Increase liquidity buffers.");
    }

    if (result.system.conf < 0.6) {
        recs.push("Activate circuit breaker logic.");
    }

    if (result.system.bank < 0.5) {
        recs.push("Strengthen banking subsystem redundancy.");
    }

    document.getElementById("recommendations").innerText =
        recs.length ? recs.join("\n") : "System operating within safe parameters.";
}
</script>

</body>
</html>
