    <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Phase 8 Institutional Control Room</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #0b0f14;
            color: #e6e6e6;
        }

        .layout {
            display: grid;
            grid-template-columns: 260px 1fr;
            height: 100vh;
        }

        .sidebar {
            background: #111827;
            padding: 16px;
            border-right: 1px solid #1f2937;
        }

        .main {
            padding: 16px;
            overflow-y: auto;
        }

        h2, h3 {
            margin-top: 0;
        }

        select, button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #1f2937;
            color: #e6e6e6;
            border: 1px solid #374151;
            border-radius: 6px;
        }

        button {
            cursor: pointer;
        }

        button:hover {
            background: #374151;
        }

        #readout {
            margin-top: 20px;
        }

        .card {
            background: #1f2937;
            padding: 12px;
            margin-bottom: 10px;
            border-radius: 8px;
            border: 1px solid #374151;
        }

        .status {
            font-weight: bold;
        }

        .stable { color: #22c55e; }
        .warning { color: #f59e0b; }
        .critical { color: #ef4444; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #374151;
            padding: 8px;
            text-align: left;
        }

        th {
            background: #111827;
        }
    </style>
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h3>Phase 8 Scenarios</h3>

        <select id="scenarioSelect">
            <option value="bank_cascade">Bank Cascade</option>
            <option value="liquidity_stress">Liquidity Stress</option>
            <option value="bank_failure">Bank Failure</option>
            <option value="systemic_shock">Systemic Shock</option>
        </select>

        <button onclick="runSimulation()">Run Simulation</button>

        <button onclick="resetView()">Reset View</button>
    </div>

    <!-- MAIN PANEL -->
    <div class="main">

        <h2>Institutional Control Room</h2>

        <div id="systemStatus" class="card">
            System: Idle
        </div>

        <div id="readout"></div>

    </div>

</div>

<script>
/* -----------------------------
   PHASE 8 SIMULATION STATE
------------------------------*/
let Phase8State = {
    nodes: {},
    system_risk: 0,
    interventions: []
};

/* -----------------------------
   RUN SIMULATION
------------------------------*/
function runSimulation() {

    const scenario = document.getElementById("scenarioSelect").value;

    // reset nodes
    Phase8State.nodes = {
        "Bank_A": { state: "STABLE", health: 1.0, risk: 0.1 },
        "Bank_B": { state: "STABLE", health: 1.0, risk: 0.1 },
        "Liquidity_Hub": { state: "STABLE", health: 1.0, risk: 0.1 }
    };

    Phase8State.interventions = [];

    document.getElementById("systemStatus").innerText =
        "Running scenario: " + scenario;

    // STEP 1: shock
    applyShock("Bank_A", 0.8);

    // STEP 2: propagation
    propagate("Bank_A", 0.8);

    // STEP 3: response
    regulatoryResponse();

    // STEP 4: risk
    computeRisk();

    renderReadout();
}

/* -----------------------------
   SHOCK
------------------------------*/
function applyShock(nodeId, intensity) {
    let node = Phase8State.nodes[nodeId];

    node.risk += intensity;
    node.health -= intensity * 0.4;

    if (node.health < 0.3) node.state = "CRITICAL";
    else if (node.health < 0.6) node.state = "WARNING";
    else node.state = "STABLE";
}

/* -----------------------------
   PROPAGATION
------------------------------*/
function propagate(origin, intensity) {

    const edges = {
        "Bank_A": ["Bank_B"],
        "Bank_B": ["Liquidity_Hub"],
        "Liquidity_Hub": ["Bank_A"]
    };

    let targets = edges[origin] || [];

    for (let t of targets) {
        applyShock(t, intensity * 0.7);
    }
}

/* -----------------------------
   REGULATORY RESPONSE
------------------------------*/
function regulatoryResponse() {

    let riskSum = 0;
    let criticalCount = 0;

    for (let id in Phase8State.nodes) {
        let n = Phase8State.nodes[id];
        riskSum += n.risk;
        if (n.state === "CRITICAL") criticalCount++;
    }

    let avgRisk = riskSum / Object.keys(Phase8State.nodes).length;

    if (avgRisk > 0.6) {
        Phase8State.interventions.push("LIQUIDITY_INJECTION");

        for (let id in Phase8State.nodes) {
            Phase8State.nodes[id].health += 0.05;
        }
    }

    if (criticalCount >= 2) {
        Phase8State.interventions.push("CAPITAL_CONTROL");
    }
}

/* -----------------------------
   RISK METRIC
------------------------------*/
function computeRisk() {

    let total = 0;

    for (let id in Phase8State.nodes) {
        total += Phase8State.nodes[id].risk;
    }

    Phase8State.system_risk =
        total / Object.keys(Phase8State.nodes).length;
}

/* -----------------------------
   RENDER READOUT
------------------------------*/
function renderReadout() {

    const container = document.getElementById("readout");

    let html = "";

    html += `<div class="card">
        <div class="status">System Risk: ${Phase8State.system_risk.toFixed(2)}</div>
        <div>Interventions: ${Phase8State.interventions.join(", ") || "NONE"}</div>
    </div>`;

    html += `<div class="card">
        <h3>Node State</h3>
        <table>
            <tr><th>Node</th><th>State</th><th>Health</th><th>Risk</th></tr>
    `;

    for (let id in Phase8State.nodes) {
        let n = Phase8State.nodes[id];

        html += `
            <tr>
                <td>${id}</td>
                <td>${n.state}</td>
                <td>${n.health.toFixed(2)}</td>
                <td>${n.risk.toFixed(2)}</td>
            </tr>
        `;
    }

    html += "</table></div>";

    container.innerHTML = html;
}

/* -----------------------------
   RESET
------------------------------*/
function resetView() {
    document.getElementById("readout").innerHTML = "";
    document.getElementById("systemStatus").innerText = "System: Idle";
}
</script>

</body>
</html>
