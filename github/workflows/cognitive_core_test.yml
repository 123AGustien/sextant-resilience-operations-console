name: Cognitive Core Test

on:
  push:
    paths:
      - "cognitive_core/**"
      - "test_cognitive_core.py"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      - name: Run Cognitive Core Test
        run: |
          python test_cognitive_core.py
