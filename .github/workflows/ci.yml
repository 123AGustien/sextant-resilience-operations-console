name: Sextant CI (Validation Gate v10)

on:
  workflow_dispatch:
  push:
    branches: ["main"]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate core structure
        run: |
          echo "Checking Sextant system..."

          test -f index.html || (echo "ERROR: index.html missing" && exit 1)

          if [ -f dashboard/index_v10.html ]; then
            echo "Dashboard OK"
          else
            echo "WARNING: dashboard missing"
          fi

          if [ -f core_engine/rp04-engine-v10.js ]; then
            echo "RP-04 engine OK"
          else
            echo "WARNING: RP-04 missing"
          fi

      - name: RP-04 validation
        run: |
          if [ -f core_engine/rp04-engine-v10.js ]; then
            grep -q "export function" core_engine/rp04-engine-v10.js && exit 1 || echo "OK"
          fi

      - name: Dashboard wiring check
        run: |
          if [ -f dashboard/index_v10.html ]; then
            grep -q "runRP04" dashboard/index_v10.html || echo "WARNING: missing runRP04"
          fi

      - name: Filename safety scan
        run: |
          find . -type f | while read file; do
            name=$(basename "$file")
            if [ ${#name} -gt 120 ]; then
              echo "WARNING: long filename $name"
            fi
          done

      - name: CI COMPLETE
        run: echo "VALIDATION COMPLETE"
