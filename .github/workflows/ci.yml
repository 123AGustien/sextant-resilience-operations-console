name: Sextant Resilience CI (Stable)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate repository structure
        run: |
          echo "Checking repo structure..."

          test -f README.md || (echo "Missing README.md" && exit 1)
          test -f index.yaml || echo "index.yaml missing (optional warning)"

          echo "Structure OK"

      - name: Validate JSON registry (if exists)
        run: |
          if [ -f registry/system-registry.json ]; then
            echo "Validating JSON..."
            cat registry/system-registry.json | python3 -m json.tool
          else
            echo "No registry found - skipping"
          fi

      - name: Lint Markdown safety check
        run: |
          echo "Checking for unsafe file operations in markdown..."

          # Ensure no accidental shell execution patterns exist
          if grep -R "\$\(" . --include="*.md"; then
            echo "Unsafe markdown patterns detected"
            exit 1
          fi

          echo "Markdown safe"

  build:
    needs: validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare deployment folder
        run: |
          mkdir -p dist
          cp -r web/* dist/ 2>/dev/null || true
          cp README.md dist/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
