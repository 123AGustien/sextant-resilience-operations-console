name: Sextant Resilience CI (Production Stable)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Verify core import
        run: |
          python -c "import main; print('API OK')" || exit 1

      - name: Runtime sanity check
        run: |
          python -c "print('System OK')"

      - name: Filename safety guard
        run: |
          find . -type f | while read file; do
            name=$(basename "$file")

            if [ ${#name} -gt 120 ]; then
              echo "ERROR: filename too long -> $name"
              exit 1
            fi

            echo "$name" | grep -E "[#{}\[\]]" && {
              echo "ERROR: unsafe filename -> $name"
              exit 1
            }
          done

  pages:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build static site
        run: |
          mkdir -p dist
          cp -r web/* dist/ 2>/dev/null || true
          cp README.md dist/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
