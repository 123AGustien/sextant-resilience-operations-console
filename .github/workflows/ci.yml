name: Sextant Resilience CI v10 (Manual Stable Gate)

on:
  workflow_dispatch:

env:
  CI_PAUSED: "false"

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─────────────────────────────
      # STRUCTURE VALIDATION ONLY
      # ─────────────────────────────

      - name: Validate core structure
        run: |
          echo "Validating Sextant repository structure..."

          test -f index.html || exit 1
          test -f dashboard/index_v10.html || exit 1
          test -f core_engine/rp04-engine-v10.js || exit 1

          echo "Core structure OK"

      # ─────────────────────────────
      # JS SANITY (NO NODE 24, NO MODULE CHECKS)
      # ─────────────────────────────

      - name: RP-04 JS validation (static)
        run: |
          if grep -q "export function" core_engine/rp04-engine-v10.js; then
            echo "ES Module detected - not allowed"
            exit 1
          fi

          if ! grep -q "function runRP04" core_engine/rp04-engine-v10.js; then
            echo "runRP04 missing"
            exit 1
          fi

          echo "RP-04 engine OK"

      # ─────────────────────────────
      # DASHBOARD WIRING CHECK
      # ─────────────────────────────

      - name: Validate dashboard wiring
        run: |
          grep -q "rp04-engine-v10.js" dashboard/index_v10.html || exit 1
          grep -q "runRP04" dashboard/index_v10.html || exit 1

          echo "Dashboard wiring OK"

      # ─────────────────────────────
      # FILE SAFETY CHECK
      # ─────────────────────────────

      - name: Filename safety guard
        run: |
          error=0

          while IFS= read -r file; do
            name=$(basename "$file")

            if [ ${#name} -gt 120 ]; then
              echo "Too long filename: $name"
              error=1
            fi

            echo "$name" | grep -E "[#{}\[\]]" >/dev/null && {
              echo "Unsafe filename: $name"
              error=1
            }
          done < <(find . -type f)

          exit $error

      # ─────────────────────────────
      # FINAL GATE
      # ─────────────────────────────

      - name: CI STABLE PASS
        run: echo "Sextant Control Room v10 CI: STABLE"
