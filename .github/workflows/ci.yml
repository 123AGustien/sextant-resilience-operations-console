name: Sextant Resilience CI (GREEN FIX)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            echo "No requirements.txt found - skipping"
          fi

      - name: Verify core import (safe)
        run: |
          python -c "import main; print('API OK')" || exit 1

      - name: Runtime sanity check
        run: |
          python -c "print('System OK')"

      - name: Filename safety guard
        run: |
          echo "Checking filenames..."

          find . -type f | while read file; do
            name=$(basename "$file")

            if [ ${#name} -gt 120 ]; then
              echo "ERROR: filename too long -> $name"
              exit 1
            fi

            echo "$name" | grep -E "[#{}\[\]]" && {
              echo "ERROR: unsafe filename -> $name"
              exit 1
            }
          done

          echo "All checks passed"
