name: Sextant Resilience CI (Manual Stable Only)

on:
  workflow_dispatch:

env:
  CI_PAUSED: "false"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    # Manual override safety gate
    if: ${{ github.event_name == 'workflow_dispatch' && env.CI_PAUSED != 'true' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Verify core import
        run: python -c "import main; print('API OK')"

      - name: Runtime sanity check
        run: python -c "print('System OK')"

      - name: Filename safety guard
        run: |
          error=0

          while IFS= read -r file; do
            name=$(basename "$file")

            if [ ${#name} -gt 120 ]; then
              echo "Too long filename detected: $name"
              error=1
            fi

            echo "$name" | grep -E "[#{}\[\]]" >/dev/null && {
              echo "Unsafe filename detected: $name"
              error=1
            }
          done < <(find . -type f)

          exit $error
