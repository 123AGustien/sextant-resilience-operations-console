name: Sextant Resilience CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=." >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify core imports
        run: |
          python -c "import core.resilience_engine; print('Core OK')"
          python -c "import core.validation_engine; print('Validation OK')"
          python -c "import api.main; print('API OK')"

      - name: Basic runtime sanity check
        run: |
          python -c "from core.resilience_engine import ResilienceEngine; engine = ResilienceEngine(); print(engine.evaluate({'risk':0.5}))"
