<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sextant v3 Macro Intelligence System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">

  <!-- v3.2: Chart Engine -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

  <div class="header">
    <h1>Sextant v3.2</h1>
    <p>Macro Intelligence Control System — Bloomberg Mode</p>
  </div>

  <div class="panel">
    <button onclick="runSimulation()">Run Cycle</button>
    <button onclick="resetSimulation()">Reset</button>
    <select id="scenarioSelect"></select>
  </div>

  <div class="grid">

    <div class="card">
      <h3>Semiconductors</h3>
      <div id="semis">0</div>
    </div>

    <div class="card">
      <h3>Industrial</h3>
      <div id="industrial">0</div>
    </div>

    <div class="card">
      <h3>Non-Tech</h3>
      <div id="nonTech">0</div>
    </div>

    <div class="card">
      <h3>Macro Index</h3>
      <div id="macroIndex">0</div>
    </div>

  </div>

  <div class="card">
    <h3>Decision Output</h3>
    <div id="decision">---</div>
  </div>

  <!-- 📊 v3.2 DASHBOARD LAYER -->
  <div class="card">
    <h3>Macro Trend Dashboard</h3>
    <canvas id="macroChart"></canvas>
  </div>

  <div class="card">
    <h3>Sector Exposure</h3>
    <canvas id="sectorChart"></canvas>
  </div>

  <div id="log"></div>

  <!-- CORE ENGINE -->
  <script src="core/sector-model.js"></script>
  <script src="core/shock-engine.js"></script>
  <script src="core/macro-engine.js"></script>

  <!-- HISTORY (v3.1 dependency) -->
  <script src="core/history-engine.js"></script>

  <!-- SCENARIOS -->
  <script src="scenarios/baseline.js"></script>
  <script src="scenarios/ai-cycle.js"></script>
  <script src="scenarios/tariff-war.js"></script>

  <!-- SYSTEM -->
  <script src="engine.js"></script>
  <script src="decision.js"></script>
  <script src="app.js"></script>

  <!-- v3.2 VISUAL SYSTEM -->
  <script src="dashboard.js"></script>

</body>
</html>
